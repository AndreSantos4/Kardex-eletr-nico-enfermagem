<link
	rel="stylesheet"
	href="../../../styles/enfermeiro/popups/popupEditarFichaUtente.css"
/>
<div class="pop-up-editar-utente">
	<div class="pop-up">
		<div class="pop-up-header">
			<div class="title"><h3>Editar Ficha de Utente</h3></div>
			<div class="icon">
				<a
					href=""
					class="cross"
					onclick="
						fecharPopUp();
						return false;
					"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						height="15"
						width="15"
						viewBox="0 0 384 512"
					>
						<path
							fill="rgb(220, 49, 26)"
							d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
						/>
					</svg>
				</a>
			</div>
		</div>
		<div class="pop-up-main">
			<form method="post" autocomplete="off" id="form-editar-utente">
				<label for="edit-name">NOME COMPLETO *</label>
				<input
					type="text"
					name="edit-name"
					id="edit-name"
					placeholder="Nome Completo"
					required
				/>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-data-nascimento"
							>DATA DE NASCIMENTO *</label
						>
						<input
							type="date"
							name="edit-data-nascimento"
							id="edit-data-nascimento"
							required
						/>
					</div>
					<div class="form-group">
						<label for="edit-sexo">SEXO *</label>
						<select name="edit-sexo" id="edit-sexo">
							<option value="">Sexo</option>
							<option value="MASCULINO">Masculino</option>
							<option value="FEMININO">Feminino</option>
						</select>
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-n-identificacao"
							>Nº IDENTIFICAÇÃO *</label
						>
						<input
							type="text"
							name="edit-n-identificacao"
							id="edit-n-identificacao"
							placeholder="BI/CC"
							maxlength="12"
							pattern="\d{9}[A-Z]{2}\d"
							title="9 dígitos, 2 letras maiúsculas e 1 dígito"
							required
						/>
					</div>
					<div class="form-group">
						<label for="edit-n-sns">Nº SNS *</label>
						<input
							type="text"
							name="edit-n-sns"
							id="edit-n-sns"
							pattern="\d{9}"
							placeholder="Número SNS"
							required
						/>
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-cama">CAMA *</label>
						<select name="edit-cama" id="edit-cama">
							<option value="">ID Cama</option>
						</select>
					</div>
					<div class="form-group">
						<label for="edit-medico-responsavel"
							>MÉDICO RESPONSÁVEL *</label
						>
						<select
							name="edit-medico-responsavel"
							id="edit-medico-responsavel"
						>
							<option value="">Médico</option>
						</select>
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-contacto">CONTACTO *</label>
						<input
							type="tel"
							name="edit-contacto"
							id="edit-contacto"
							placeholder="Contacto"
							required
						/>
					</div>
					<div class="form-group">
						<label for="edit-contacto-emg"
							>CONTACTO EMERGÊNCIA *</label
						>
						<input
							type="tel"
							name="edit-contacto-emg"
							id="edit-contacto-emg"
							placeholder="Contacto"
							required
						/>
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label>FLAGS DE RISCO *</label>
						<div class="flags-box">
							<label class="flag-item"
								><input
									type="checkbox"
									name="edit-flags"
									value="fuga"
								/>
								Risco de Fuga</label
							>
							<label class="flag-item"
								><input
									type="checkbox"
									name="edit-flags"
									value="automotilacao"
								/>
								Risco de Automotilação</label
							>
							<label class="flag-item"
								><input
									type="checkbox"
									name="edit-flags"
									value="queda"
								/>
								Risco de Queda</label
							>
							<label class="flag-item"
								><input
									type="checkbox"
									name="edit-flags"
									value="agressividade"
								/>
								Risco de Agressividade</label
							>
						</div>
					</div>
					<div class="form-group">
						<label>ALERGIAS CONHECIDAS *</label>
						<div class="alergias-box" id="edit-alergias-box">
							<div class="alergia-item">
								<input
									type="text"
									name="edit-alergias[]"
									placeholder="Alergia"
								/>
								<button
									type="button"
									class="btn-remover-alergia"
								>
									−
								</button>
							</div>
						</div>
						<button
							type="button"
							class="btn-adicionar-alergia"
							id="edit-btn-adicionar-alergia"
						>
							+ Adicionar outras Alergias
						</button>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
