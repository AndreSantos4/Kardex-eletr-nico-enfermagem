<div class="popup-incidente-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000] font-sans" style="display: none;">
	<div class="popup-incidente-box bg-primary rounded-[10px] w-full max-w-[720px] shadow-[0_8px_32px_rgba(0,0,0,0.4)] overflow-hidden">
		<div class="popup-incidente-header bg-bg-dark px-5 py-[14px] flex items-center justify-between text-base font-bold text-white">
			<span>Registar Incidente Clínico</span>
			<button class="popup-incidente-close bg-[#c0392b] border-0 text-white text-sm font-bold w-8 h-8 rounded-full cursor-pointer flex items-center justify-center hover:bg-[#e74c3c] transition-colors" onclick="fecharPopupRegistarIncidente()">&#10005;</button>
		</div>
		<div class="popup-incidente-content px-6 pt-[22px] pb-6">
			<form id="form-registar-incidente" onsubmit="submeterRegistarIncidente(event)" class="flex flex-col gap-[18px] [&_.popup-incidente-field]:flex [&_.popup-incidente-field]:flex-col [&_.popup-incidente-field]:gap-2 [&_.popup-incidente-label]:text-[11px] [&_.popup-incidente-label]:font-extrabold [&_.popup-incidente-label]:tracking-[0.07em] [&_.popup-incidente-label]:text-white [&_.popup-incidente-label]:uppercase [&_select]:bg-white [&_select]:border-[1.5px] [&_select]:border-secondary/40 [&_select]:rounded-full [&_select]:text-bg-dark [&_select]:text-[13px] [&_select]:font-medium [&_select]:px-[18px] [&_select]:py-[11px] [&_select]:w-full [&_select]:cursor-pointer [&_select:focus]:outline-none [&_select:focus]:border-secondary [&_input]:bg-white [&_input]:border-[1.5px] [&_input]:border-secondary/40 [&_input]:rounded-full [&_input]:text-bg-dark [&_input]:text-[13px] [&_input]:font-medium [&_input]:px-[18px] [&_input]:py-[11px] [&_input]:w-full [&_input]:cursor-pointer [&_input:focus]:outline-none [&_input:focus]:border-secondary [&_textarea]:bg-white [&_textarea]:border-[1.5px] [&_textarea]:border-secondary/40 [&_textarea]:rounded-[14px] [&_textarea]:text-bg-dark [&_textarea]:text-[13px] [&_textarea]:px-[18px] [&_textarea]:py-3.5 [&_textarea]:w-full [&_textarea]:min-h-[110px] [&_textarea]:resize-y [&_textarea:focus]:outline-none [&_textarea:focus]:border-secondary">
				<div class="popup-incidente-row-2cols grid grid-cols-2 gap-[14px]">
					<div class="popup-incidente-field">
						<label class="popup-incidente-label">TIPO *</label>
						<select id="tipo-incidente" class="popup-incidente-select">
							<option value="QUEDA">Queda</option>
							<option value="ERRO_MEDICACAO">Erro de medicação</option>
							<option value="REACAO_ADVERSA">Reação adversa</option>
							<option value="INFECAO">Infeção nosocomial</option>
							<option value="LESAO_PRESSAO">Lesão por pressão</option>
							<option value="EXTRAVASAMENTO">Extravasamento</option>
							<option value="AGITACAO">Agitação psicomotora</option>
							<option value="OUTRO">Outro</option>
						</select>
					</div>
					<div class="popup-incidente-field">
						<label class="popup-incidente-label">DATA/HORA *</label>
						<input type="datetime-local" id="data-hora-incidente" class="popup-incidente-input" />
					</div>
				</div>
				<div class="popup-incidente-field">
					<label class="popup-incidente-label">GRAVIDADE *</label>
					<select id="gravidade-incidente" class="popup-incidente-select">
						<option value="LIGEIRA">Ligeira</option>
						<option value="MODERADA" selected>Moderada</option>
						<option value="GRAVE">Grave</option>
						<option value="CRITICA">Crítica</option>
					</select>
				</div>
				<div class="popup-incidente-field">
					<label class="popup-incidente-label">DESCRIÇÃO *</label>
					<textarea id="descricao-incidente" class="popup-incidente-textarea" placeholder="Descreva o incidente de forma objetiva e cronológica." rows="4"></textarea>
				</div>
				<div class="popup-incidente-info-note bg-secondary/20 border border-secondary/35 rounded-full px-[18px] py-2.5 flex items-center gap-3 text-[13px] font-semibold text-white justify-center">
					<div class="popup-incidente-info-icon w-8 h-8 rounded-full bg-bg-dark text-white font-bold text-lg italic flex items-center justify-center shrink-0" style="font-family:serif;">i</div>
					<span>Registo imutável após confirmação.</span>
				</div>
				<div class="popup-incidente-actions flex gap-3 mt-1">
					<button type="button" class="btn-cancelar-incidente flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-[11px] rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors" onclick="fecharPopupRegistarIncidente()">CANCELAR</button>
					<button type="submit" class="btn-confirmar-incidente flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-[11px] rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors">REGISTAR</button>
				</div>
			</form>
		</div>
	</div>
</div>
