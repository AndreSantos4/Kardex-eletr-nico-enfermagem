<link rel="stylesheet" href="../../../styles/enfermeiro/popups/popupCriarPlanoCuidados.css" />

<div class="pop-up-criar-plano-cuidados" style="display: none">
    <div class="pop-up">
        <div class="pop-up-header">
            <div class="title">
                <h3>Criar Plano de Cuidados</h3>
            </div>
            <div class="icon">
                <a href="" class="cross" onclick="fecharPopUp('.pop-up-criar-plano-cuidados'); return false;">
                    <svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
                        <path fill="rgb(220, 49, 26)"
                            d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
                    </svg>
                </a>
            </div>
        </div>
        <div class="pop-up-main">
            <form method="post" autocomplete="off" onsubmit="criarPlanoCuidados(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>DIAGNÓSTICOS DE ENFERMAGEM *</label>
                        <div class="alergias-box" id="diagnosticos-box"></div>
                        <button type="button" class="btn-adicionar-alergia" id="btn-adicionar-diagnostico">+</button>
                    </div>
                </div>

                <div class="buttons-bottom">
                    <input type="button" value="Cancelar" class="btn-cancelar"
                        onclick="fecharPopUp('.pop-up-criar-plano-cuidados')" />
                    <input type="submit" value="Criar Plano" />
                </div>
            </form>
        </div>
    </div>
</div>
