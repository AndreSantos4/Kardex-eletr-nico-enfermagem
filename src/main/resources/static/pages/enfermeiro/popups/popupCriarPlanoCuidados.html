<link rel="stylesheet" href="../../../styles/enfermeiro/popups/popupCriarUtente.css" />
<div class="pop-up-criar-utente">
    <div class="pop-up">
        <div class="pop-up-header">
            <div class="title">
                <h3>Criar Plano de Cuidados</h3>
            </div>
            <div class="icon">
                <a href="" class="cross" onclick="
            fecharPopUp();
            return false;
          ">
                    <svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
                        <path fill="rgb(220, 49, 26)"
                            d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
                    </svg>
                </a>
            </div>
        </div>
        <div class="pop-up-main">
            <form method="post" autocomplete="off">
                <div class="form-row">
                    <div class="form-group">
                        <label for="diagnostico-principal">DIAGNÓSTICO DE ENFERMAGEM *</label>
                        <input type="text" name="diagnostico-principal" id="diagnostico-principal"
                            placeholder="Risco de agressividade r/c doença psiquiatrica" required />
                    </div>

                    <div class="form-group">
                        <label>Prioridade</label>
                        <div class="alergias-box">
                            <div class="alergia-item">
                                <select name="cars" id="cars">
                                    <option value="media">média</option>
                                </select>
                                

                                <button type="button" class="btn-remover-alergia">−</button>
                            </div>
                        </div>
                        <button type="button" class="btn-adicionar-alergia">
                            + 
                        </button>
                    </div>
                </div>

                <div class="buttons-bottom">
                    <input type="button" value="Cancelar" class="btn-cancelar" onclick="fecharPopUp()" />
                    <input type="submit" value="Criar Plano" />
                </div>
            </form>
        </div>
    </div>
</div>
