<div class="pop-up-criar-utente fixed inset-0 z-10 flex items-center justify-center min-h-screen w-full h-full bg-black/55">
  <div class="pop-up bg-[#1a5f7a] rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.45)] w-[820px] max-w-[95vw] max-h-[92vh] overflow-y-auto">
    <div class="pop-up-header bg-[#154e66] flex items-center justify-between px-[18px] py-[14px] border-b border-white/10 sticky top-0 z-10">
      <div class="title"><h3 class="text-text text-[1.05rem] font-semibold m-0">Criar Ficha de Utente</h3></div>
      <div class="icon">
        <a href="" class="cross flex items-center justify-center bg-white rounded-full w-7 h-7 hover:bg-[#bababa]" onclick="fecharPopUp(); return false;">
          <svg xmlns="http://www.w3.org/2000/svg" height="13" width="13" viewBox="0 0 384 512">
            <path fill="rgb(220, 49, 26)" d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
          </svg>
        </a>
      </div>
    </div>
    <div class="pop-up-main px-[18px] py-[14px] flex flex-col gap-2 [&_label]:block [&_label]:text-[#e0f0f8] [&_label]:text-[0.68rem] [&_label]:font-bold [&_label]:tracking-[0.8px] [&_label]:uppercase [&_label]:mb-1 [&_input[type=text]]:w-full [&_input[type=text]]:bg-white [&_input[type=text]]:border-[1.5px] [&_input[type=text]]:border-white/35 [&_input[type=text]]:rounded-md [&_input[type=text]]:px-[10px] [&_input[type=text]]:py-2 [&_input[type=text]]:text-[0.87rem] [&_input[type=text]]:text-[#1a3a4a] [&_input[type=text]]:outline-none [&_input[type=text]]:mb-[6px] [&_input[type=date]]:w-full [&_input[type=date]]:bg-white [&_input[type=date]]:border-[1.5px] [&_input[type=date]]:border-white/35 [&_input[type=date]]:rounded-md [&_input[type=date]]:px-[10px] [&_input[type=date]]:py-2 [&_input[type=date]]:text-[0.87rem] [&_input[type=date]]:text-[#1a3a4a] [&_input[type=date]]:outline-none [&_input[type=date]]:mb-[6px] [&_input[type=tel]]:w-full [&_input[type=tel]]:bg-white [&_input[type=tel]]:border-[1.5px] [&_input[type=tel]]:border-white/35 [&_input[type=tel]]:rounded-md [&_input[type=tel]]:px-[10px] [&_input[type=tel]]:py-2 [&_input[type=tel]]:text-[0.87rem] [&_input[type=tel]]:text-[#1a3a4a] [&_input[type=tel]]:outline-none [&_input[type=tel]]:mb-[6px] [&_select]:w-full [&_select]:bg-white [&_select]:border-[1.5px] [&_select]:border-white/35 [&_select]:rounded-md [&_select]:px-[10px] [&_select]:py-2 [&_select]:text-[0.87rem] [&_select]:text-[#1a3a4a] [&_select]:outline-none [&_select]:mb-[6px] [&_textarea]:w-full [&_textarea]:bg-white [&_textarea]:border-[1.5px] [&_textarea]:border-white/35 [&_textarea]:rounded-md [&_textarea]:px-[10px] [&_textarea]:py-2 [&_textarea]:text-[0.87rem] [&_textarea]:text-[#1a3a4a] [&_textarea]:outline-none [&_textarea]:mb-[6px] [&_textarea]:min-h-[80px] [&_textarea]:resize-y">
      <form method="post" autocomplete="off">
        <label for="name">NOME COMPLETO *</label>
        <input type="text" name="name" id="name" placeholder="Nome Completo" required />

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label for="data-nascimento">DATA DE NASCIMENTO *</label>
            <input type="date" name="data-nascimento" id="data-nascimento" required />
          </div>
          <div class="form-group flex-1">
            <label for="sexo">Sexo *</label>
            <select name="sexo" id="sexo">
              <option value="MASCULINO">Masculino</option>
              <option value="FEMININO">Feminino</option>
            </select>
          </div>
          <div class="form-group flex-1">
            <label for="cama">CAMA *</label>
            <select name="cama" id="cama"></select>
          </div>
        </div>

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label for="n-identificacao">Nº IDENTIFICAÇÃO *</label>
            <input type="text" name="n-identificacao" id="n-identificacao" placeholder="BI/CC" maxlength="12" pattern="\d{9}[A-Z]{2}\d" title="9 dígitos, 2 letras maiúsculas e 1 dígito" required />
          </div>
          <div class="form-group flex-1">
            <label for="n-sns">Nº SNS *</label>
            <input type="text" name="n-sns" id="n-sns" pattern="\d{9}" placeholder="Número SNS" required />
          </div>
          <div class="form-group flex-1">
            <label for="medico-responsavel">MÉDICO RESPONSÁVEL *</label>
            <select name="medico-responsavel" id="medico-responsavel"></select>
          </div>
        </div>

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label for="diagnostico-principal">DIAGNÓSTICO PRINCIPAL *</label>
            <input type="text" name="diagnostico-principal" id="diagnostico-principal" placeholder="CID-10 / Diagnóstico" required />
          </div>
          <div class="form-group flex-1">
            <label for="contacto">CONTACTO *</label>
            <input type="tel" name="contacto" id="contacto" placeholder="Contacto" required />
          </div>
          <div class="form-group flex-1">
            <label for="contacto-emg">CONTACTO EMERGÊNCIA *</label>
            <input type="tel" name="contacto-emg" id="contacto-emg" placeholder="Contacto Emergência" required />
          </div>
        </div>

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label>ALERGIAS CONHECIDAS</label>
            <div class="alergias-box flex flex-col gap-1 mb-2">
              <div class="alergia-item flex gap-2 items-center">
                <input type="text" placeholder="Alergia" class="!mb-0" />
                <button type="button" class="btn-remover-alergia w-7 h-7 rounded bg-red-600 text-white font-bold text-base cursor-pointer hover:bg-red-700 shrink-0">−</button>
              </div>
            </div>
            <button type="button" class="btn-adicionar-alergia text-[#a8d4e6] text-xs font-semibold bg-transparent border border-white/30 rounded px-3 py-1 cursor-pointer hover:bg-white/10">
              + Adicionar outras Alergias
            </button>
          </div>

          <div class="form-group flex-1">
            <label>FLAGS DE RISCO</label>
            <div class="flags-box flex flex-col gap-1">
              <label class="flag-item flex items-center gap-2 !text-text !text-sm !normal-case !tracking-normal !font-normal !mb-0"><input type="checkbox" name="flags" value="fuga" class="!w-auto !mb-0" /> Risco de Fuga</label>
              <label class="flag-item flex items-center gap-2 !text-text !text-sm !normal-case !tracking-normal !font-normal !mb-0"><input type="checkbox" name="flags" value="automotilacao" class="!w-auto !mb-0" /> Risco de Automotilação</label>
              <label class="flag-item flex items-center gap-2 !text-text !text-sm !normal-case !tracking-normal !font-normal !mb-0"><input type="checkbox" name="flags" value="queda" class="!w-auto !mb-0" /> Risco de Queda</label>
              <label class="flag-item flex items-center gap-2 !text-text !text-sm !normal-case !tracking-normal !font-normal !mb-0"><input type="checkbox" name="flags" value="agressividade" class="!w-auto !mb-0" /> Risco de Agressividade</label>
            </div>
          </div>

          <div class="form-group flex-1">
            <label>MOTIVO DE INTERNAMENTO</label>
            <textarea name="motivo-internamento" placeholder="Motivo de internamento e contexto clínico ..."></textarea>
          </div>
        </div>

        <div class="buttons-bottom flex py-[2%] gap-[10px]">
          <input type="button" value="Cancelar" class="btn-cancelar flex-1 p-[10px] bg-[#2a7fa0] text-white border-2 border-white/30 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-95 transition-all" onclick="fecharPopUp()" />
          <input type="submit" value="Guardar" class="flex-1 p-[10px] bg-[#2a7fa0] text-white border-2 border-white/30 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-95 transition-all" />
        </div>
      </form>
    </div>
  </div>
</div>
