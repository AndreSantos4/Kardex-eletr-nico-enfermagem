<div class="popup-sos-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000] font-sans" style="display: none;">
	<div class="popup-sos-box bg-primary rounded-[10px] w-full max-w-[680px] max-h-[90vh] shadow-[0_8px_32px_rgba(0,0,0,0.4)] overflow-hidden flex flex-col">
		<div class="popup-sos-header bg-bg-dark px-[22px] py-[14px] flex items-center justify-between text-base font-bold text-white shrink-0">
			<span>Registar Administração SOS</span>
			<button class="popup-sos-close bg-[#c0392b] border-0 text-white text-sm font-bold w-[30px] h-[30px] rounded-full cursor-pointer flex items-center justify-center hover:bg-[#e74c3c] transition-colors leading-none" onclick="fecharPopupAdministrarSOS()">&#10005;</button>
		</div>
		<div class="popup-sos-content px-6 pt-5 pb-6 flex flex-col gap-4 overflow-y-auto">
			<div class="popup-sos-info-card bg-secondary/20 border border-secondary/35 rounded-full px-4 py-2.5 flex items-center gap-3 text-white">
				<div class="popup-sos-info-icon w-[34px] h-[34px] rounded-full bg-white text-primary font-bold text-lg italic flex items-center justify-center shrink-0" style="font-family:serif;">i</div>
				<div class="popup-sos-info-text flex flex-col gap-0.5 leading-[1.35] text-[12.5px]">
					<strong class="font-bold text-[13px]" id="sos-prescricao-medicamento">Selecionar prescrição SOS</strong>
					<span id="sos-prescricao-detalhe">Dose máx. e intervalo mínimo definidos pela prescrição.</span>
				</div>
			</div>

			<form id="form-administrar-sos" onsubmit="submeterAdministrarSOS(event)" class="flex flex-col gap-[14px] [&_.popup-sos-field]:flex [&_.popup-sos-field]:flex-col [&_.popup-sos-field]:gap-1.5 [&_.popup-sos-label]:text-[11px] [&_.popup-sos-label]:font-extrabold [&_.popup-sos-label]:tracking-[0.07em] [&_.popup-sos-label]:text-white [&_.popup-sos-label]:uppercase [&_select]:bg-white [&_select]:border-[1.5px] [&_select]:border-secondary/40 [&_select]:rounded-md [&_select]:text-bg-dark [&_select]:text-[13px] [&_select]:font-semibold [&_select]:px-3.5 [&_select]:py-2.5 [&_select]:w-full [&_select]:cursor-pointer [&_select:focus]:outline-none [&_select:focus]:border-secondary [&_input]:bg-white [&_input]:border-[1.5px] [&_input]:border-secondary/40 [&_input]:rounded-md [&_input]:text-bg-dark [&_input]:text-[13px] [&_input]:font-semibold [&_input]:px-3.5 [&_input]:py-2.5 [&_input]:w-full [&_input]:cursor-pointer [&_input:focus]:outline-none [&_input:focus]:border-secondary [&_textarea]:bg-white [&_textarea]:border-[1.5px] [&_textarea]:border-secondary/40 [&_textarea]:rounded-md [&_textarea]:text-bg-dark [&_textarea]:text-[13px] [&_textarea]:px-3.5 [&_textarea]:py-2.5 [&_textarea]:w-full [&_textarea]:min-h-[90px] [&_textarea]:resize-y [&_textarea]:leading-[1.5] [&_textarea:focus]:outline-none [&_textarea:focus]:border-secondary">
				<div class="popup-sos-field">
					<label class="popup-sos-label">CONDIÇÃO CLÍNICA QUE JUSTIFICA A ADMINISTRAÇÃO *</label>
					<select id="condicao-sos" class="popup-sos-select" required>
						<option value="AGITACAO_PSICOMOTORA">Agitação psicomotora</option>
						<option value="ANSIEDADE">Ansiedade</option>
						<option value="INSONIA">Insónia</option>
						<option value="DOR">Dor</option>
						<option value="NAUSEA">Náusea / Vómito</option>
						<option value="OUTRO">Outro</option>
					</select>
				</div>

				<div class="popup-sos-field">
					<label class="popup-sos-label">DESCRIÇÃO DA SITUAÇÃO *</label>
					<textarea id="descricao-sos" class="popup-sos-textarea" placeholder="Descreve o estado do utente e o que motivou a administração SOS..." rows="4" required></textarea>
				</div>

				<div class="popup-sos-row-2cols grid grid-cols-2 gap-[14px]">
					<div class="popup-sos-field">
						<label class="popup-sos-label">DATA/HORA *</label>
						<input type="datetime-local" id="data-hora-sos" class="popup-sos-input" required />
					</div>
					<div class="popup-sos-field">
						<label class="popup-sos-label">DOSE ADMINISTRADA *</label>
						<input type="text" id="dose-sos" class="popup-sos-input" placeholder="Ex: 5mg" required />
					</div>
				</div>

				<div class="popup-sos-info-note bg-secondary/20 border border-secondary/35 rounded-md px-3.5 py-2.5 flex items-center gap-3 text-white text-xs leading-[1.4]">
					<div class="popup-sos-info-note-icon w-7 h-7 rounded-full bg-bg-dark text-white font-bold text-[15px] italic flex items-center justify-center shrink-0" style="font-family:serif;">i</div>
					<span>Registo crítico — verifique o intervalo mínimo e a dose máxima da prescrição antes de confirmar.</span>
				</div>

				<div class="popup-sos-actions flex gap-3 mt-1">
					<button type="button" class="btn-cancelar-sos flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-[11px] rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors" onclick="fecharPopupAdministrarSOS()">CANCELAR</button>
					<button type="submit" class="btn-confirmar-sos flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-[11px] rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors">REGISTAR</button>
				</div>
			</form>
		</div>
	</div>
</div>
