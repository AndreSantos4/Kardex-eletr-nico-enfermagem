<link rel="stylesheet" href="../../../styles/enfermeiro/popups/popupRegistarAdminstracaoSOS.css" />

<div class="popup-sos-overlay" style="display: none;">
	<div class="popup-sos-box">
		<div class="popup-sos-header">
			<span>Registar Administração SOS</span>
			<button class="popup-sos-close" onclick="fecharPopupAdministrarSOS()">&#10005;</button>
		</div>
		<div class="popup-sos-content">
			<div class="popup-sos-info-card">
				<div class="popup-sos-info-icon">i</div>
				<div class="popup-sos-info-text">
					<strong id="sos-prescricao-medicamento">Selecionar prescrição SOS</strong>
					<span id="sos-prescricao-detalhe">Dose máx. e intervalo mínimo definidos pela prescrição.</span>
				</div>
			</div>

			<form id="form-administrar-sos" onsubmit="submeterAdministrarSOS(event)">
				<div class="popup-sos-field">
					<label class="popup-sos-label">CONDIÇÃO CLÍNICA QUE JUSTIFICA A ADMINISTRAÇÃO *</label>
					<select id="condicao-sos" class="popup-sos-select" required>
						<option value="AGITACAO_PSICOMOTORA">Agitação psicomotora</option>
						<option value="ANSIEDADE">Ansiedade</option>
						<option value="INSONIA">Insónia</option>
						<option value="DOR">Dor</option>
						<option value="NAUSEA">Náusea / Vómito</option>
						<option value="OUTRO">Outro</option>
					</select>
				</div>

				<div class="popup-sos-field">
					<label class="popup-sos-label">DESCRIÇÃO DA SITUAÇÃO *</label>
					<textarea id="descricao-sos" class="popup-sos-textarea"
						placeholder="Descreve o estado do utente e o que motivou a administração SOS..."
						rows="4" required></textarea>
				</div>

				<div class="popup-sos-row-2cols">
					<div class="popup-sos-field">
						<label class="popup-sos-label">DATA/HORA *</label>
						<input type="datetime-local" id="data-hora-sos" class="popup-sos-input" required />
					</div>
					<div class="popup-sos-field">
						<label class="popup-sos-label">DOSE ADMINISTRADA *</label>
						<input type="text" id="dose-sos" class="popup-sos-input" placeholder="Ex: 5mg" required />
					</div>
				</div>

				<div class="popup-sos-info-note">
					<div class="popup-sos-info-note-icon">i</div>
					<span>Registo crítico — verifique o intervalo mínimo e a dose máxima da prescrição antes de confirmar.</span>
				</div>

				<div class="popup-sos-actions">
					<button type="button" class="btn-cancelar-sos" onclick="fecharPopupAdministrarSOS()">CANCELAR</button>
					<button type="submit" class="btn-confirmar-sos">REGISTAR</button>
				</div>
			</form>
		</div>
	</div>
</div>
