<div class="pop-up-sinaisVitais fixed inset-0 z-[1000] flex items-center justify-center bg-black/50 backdrop-blur-[4px]" style="display: none">
	<div class="pop-up bg-[#1a5f7a] rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.45)] w-[700px] max-w-[95vw] overflow-hidden">
		<div class="pop-up-header bg-[#154e66] flex items-center justify-between px-[18px] py-[14px] border-b border-white/10">
			<div class="title">
				<h3 class="text-white text-[1.05rem] font-semibold m-0">Registar Sinais Vitais</h3>
			</div>
			<div class="icon">
				<a href="" class="cross flex items-center justify-center bg-white rounded-full w-7 h-7 hover:bg-[#bababa]" onclick="fecharPopUp('.pop-up-sinaisVitais'); return false;">
					<svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
						<path fill="rgb(220, 49, 26)" d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
					</svg>
				</a>
			</div>
		</div>
		<div class="px-[18px] py-[14px] flex flex-col gap-2 [&_label]:block [&_label]:text-[#e0f0f8] [&_label]:text-[0.68rem] [&_label]:font-bold [&_label]:tracking-[0.8px] [&_label]:uppercase [&_label]:mb-1 [&_input]:w-full [&_input]:bg-white [&_input]:border-[1.5px] [&_input]:border-white/35 [&_input]:rounded-md [&_input]:px-[10px] [&_input]:py-2 [&_input]:text-[0.87rem] [&_input]:text-[#1a3a4a] [&_input]:outline-none [&_input]:mb-[6px] [&_input]:box-border [&_input:focus]:border-white/85 [&_input:focus]:shadow-[0_0_0_3px_rgba(255,255,255,0.15)] [&_textarea]:w-full [&_textarea]:bg-white [&_textarea]:border-[1.5px] [&_textarea]:border-white/35 [&_textarea]:rounded-md [&_textarea]:px-[10px] [&_textarea]:py-2 [&_textarea]:text-[0.87rem] [&_textarea]:text-[#1a3a4a] [&_textarea]:outline-none [&_textarea]:resize-y [&_textarea]:min-h-[95px] [&_textarea]:font-sans [&_textarea]:box-border [&_textarea]:mb-[6px]">
			<form onsubmit="registarSinaisVitais(event)" method="post">
				<div class="flex gap-3">
					<div class="flex-1">
						<label for="pa-sistolica">PA SISTÓLICA (mmHg) *</label>
						<input type="number" id="pa-sistolica" placeholder="Ex: 120" required />
					</div>
					<div class="flex-1">
						<label for="pa-diastolica">PA DIASTÓLICA (mmHg) *</label>
						<input type="number" id="pa-diastolica" placeholder="Ex: 80" required />
					</div>
					<div class="flex-1">
						<label for="freq-cardiaca">FREQ. CARDÍACA (bpm) *</label>
						<input type="number" id="freq-cardiaca" placeholder="Ex: 72" required />
					</div>
				</div>
				<div class="flex gap-3">
					<div class="flex-1">
						<label for="temperatura">TEMPERATURA (ºC) *</label>
						<input type="number" step="0.1" id="temperatura" placeholder="Ex: 36.5" required />
					</div>
					<div class="flex-1">
						<label for="spo2">SpO2 (%) *</label>
						<input type="number" id="spo2" placeholder="Ex: 98" required />
					</div>
					<div class="flex-1">
						<label for="dor">DOR *</label>
						<input type="number" min="0" max="10" id="dor" placeholder="Ex: 8" required />
					</div>
				</div>
				<div class="flex gap-3">
					<div class="flex-1">
						<label for="glicemia">GLICÉMIA (mg/dL) *</label>
						<input type="number" id="glicemia" placeholder="Ex: 182" required />
						<label for="data-hora">DATA/HORA *</label>
						<input type="datetime-local" id="data-hora" required />
					</div>
					<div class="flex-[2]">
						<label for="observacoes">OBSERVAÇÕES</label>
						<textarea id="observacoes" placeholder="Estado do utente, contexto ...."></textarea>
					</div>
				</div>
				<div class="flex py-[2%] gap-2.5">
					<input type="button" value="Cancelar" class="flex-1 p-2.5 bg-[#2a7fa0] text-white border-2 border-white/50 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-[0.97]" onclick="fecharPopUp('.pop-up-sinaisVitais')" />
					<input type="submit" value="Registar" class="flex-1 p-2.5 bg-[#2a7fa0] text-white border-2 border-white/50 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-[0.97]" />
				</div>
			</form>
		</div>
	</div>
</div>
