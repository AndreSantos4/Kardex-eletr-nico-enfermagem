<!-- Popup Histórico de Internamentos (read-only) -->
<div class="popup-hist-internamentos-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000] font-sans" style="display: none;">
	<div class="bg-primary rounded-[10px] w-full max-w-[720px] max-h-[85vh] shadow-2xl overflow-hidden flex flex-col">
		<div class="bg-bg-dark px-[22px] py-4 flex items-center justify-between text-white">
			<h3 class="m-0 text-base font-bold tracking-[0.02em]">Histórico de Internamentos - <span id="popup-hist-utente">—</span></h3>
			<button onclick="fecharPopupHistInternamentos()" aria-label="Fechar"
				class="bg-[#c0392b] border-0 text-white text-base font-bold w-9 h-9 rounded-full cursor-pointer flex items-center justify-center transition leading-none hover:bg-[#e74c3c]">×</button>
		</div>

		<div class="px-6 pt-5 pb-6 flex flex-col gap-3 overflow-y-auto" id="popup-hist-lista">
			<div class="text-center py-7 px-4 text-white/70 italic">Sem internamentos registados.</div>
		</div>
	</div>
</div>
