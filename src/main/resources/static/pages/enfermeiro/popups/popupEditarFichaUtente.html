<link rel="stylesheet" href="../../styles/enfermeiro/popups/popupEditarFichaUtente.css" />

<div class="pop-up-editar-utente" style="display:none;">
	<div class="pop-up">
		<div class="pop-up-header">
			<div class="title">
				<h3>Editar Ficha de Utente</h3>
			</div>
			<div class="icon">
				<a href="" class="cross" onclick="fecharPopUp('.pop-up-editar-utente'); return false;">
					<svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
						<path fill="rgb(220, 49, 26)"
							d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
					</svg>
				</a>
			</div>
		</div>
		<div class="pop-up-main">
			<form method="post" autocomplete="off" id="form-editar-utente" onsubmit="editarUtente(event)">
				<label for="edit-name">NOME COMPLETO *</label>
				<input type="text" name="edit-name" id="edit-name" placeholder="Nome Completo" required />

				<div class="form-row">
					<div class="form-group">
						<label for="edit-data-nascimento">DATA DE NASCIMENTO *</label>
						<input type="date" name="edit-data-nascimento" id="edit-data-nascimento" required />
					</div>
					<div class="form-group">
						<label for="edit-sexo">SEXO *</label>
						<select name="edit-sexo" id="edit-sexo">
							<option value="">Sexo</option>
							<option value="MASCULINO">Masculino</option>
							<option value="FEMININO">Feminino</option>
						</select>
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-n-identificacao">Nº IDENTIFICAÇÃO *</label>
						<input type="text" name="edit-n-identificacao" id="edit-n-identificacao" placeholder="BI/CC"
							maxlength="12" pattern="\d{9}[A-Z]{2}\d" title="9 dígitos, 2 letras maiúsculas e 1 dígito"
							required />
					</div>
					<div class="form-group">
						<label for="edit-n-sns">Nº SNS *</label>
						<input type="text" name="edit-n-sns" id="edit-n-sns" pattern="\d{9}" placeholder="Número SNS"
							required />
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-cama">CAMA *</label>
						<!-- select substituído pelo searchable pelo JS, igual ao criar utente -->
						<select name="edit-cama" id="edit-cama"></select>
					</div>
					<div class="form-group">
						<label for="edit-medico-responsavel">MÉDICO RESPONSÁVEL *</label>
						<select name="edit-medico-responsavel" id="edit-medico-responsavel"></select>
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label for="edit-contacto">CONTACTO *</label>
						<input type="tel" name="edit-contacto" id="edit-contacto" placeholder="Contacto" required />
					</div>
					<div class="form-group">
						<label for="edit-contacto-emg">CONTACTO EMERGÊNCIA *</label>
						<input type="tel" name="edit-contacto-emg" id="edit-contacto-emg" placeholder="Contacto"
							required />
					</div>
				</div>

				<div class="form-row">
					<div class="form-group">
						<label>FLAGS DE RISCO</label>
						<div class="flags-box">
							<label class="flag-item"><input type="checkbox" name="edit-flags" value="RISCO_FUGA" />
								Risco de Fuga</label>
							<label class="flag-item"><input type="checkbox" name="edit-flags"
									value="RISCO_AUTOMUTILACAO" /> Risco de Automotilação</label>
							<label class="flag-item"><input type="checkbox" name="edit-flags" value="RISCO_QUEDA" />
								Risco de Queda</label>
							<label class="flag-item"><input type="checkbox" name="edit-flags"
									value="RISCO_AGRESSIVIDADE" /> Risco de Agressividade</label>
						</div>
					</div>
					<div class="form-group">
						<label>ALERGIAS CONHECIDAS</label>
						<div class="alergias-box" id="edit-alergias-box">
							<!-- linhas injectadas pelo JS -->
						</div>
						<button type="button" class="btn-adicionar-alergia" id="edit-btn-adicionar-alergia">
							+ Adicionar outras Alergias
						</button>
					</div>
				</div>

				<div class="buttons-bottom">
					<input type="button" value="Cancelar" onclick="fecharPopUp('.pop-up-editar-utente')" />
					<input type="submit" value="Guardar" />
				</div>
			</form>
		</div>
	</div>
</div>
