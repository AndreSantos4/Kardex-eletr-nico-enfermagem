<!doctype html>
<html lang="pt">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" type="text/css" href="../../styles/rootAndBody.css" />
	<link rel="stylesheet" type="text/css" href="../../styles/topBar.css" />
	<link rel="stylesheet" href="../../styles/enfermeiro/enfermeiroHistoricoPrescricoes.css" />
	<title>Histórico de Prescrições</title>
</head>

<body>
	<!--Top Bar-->
	<div class="topbar">
		<span class="topbar-page">Histórico de Prescrições</span>
		<div class="topbar-right">
			<span class="topbar-user">Enf. <span id="nome-enfermeiro"></span><span id="turno-wrapper"> | Turno:
				<span id="turno"></span></span></span>
			<button class="btn-sair" onclick="logout()">SAIR</button>
		</div>
	</div>

	<!--Side Bar + Main-->
	<div class="main-container">
		<aside class="sidebar">
			<nav>
				<div class="sidebar-section-label">Principal</div>
				<ul>
					<li class="sidebar-item">
						<a href="enfermeiroDashboard">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
								<path
									d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1zm16 50.1L96 199.7 96 448c0 8.8 7.2 16 16 16l48 0 0-104c0-39.8 32.2-72 72-72l48 0c39.8 0 72 32.2 72 72l0 104 48 0c8.8 0 16-7.2 16-16l0-248.3-160-143.4zM208 464l96 0 0-104c0-13.3-10.7-24-24-24l-48 0c-13.3 0-24 10.7-24 24l0 104z" />
							</svg>
							Home
						</a>
					</li>
					<li class="sidebar-item">
						<a href="enfermeiroListaUtentes">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
								<path
									d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32zm521.3 64c4.3-9.8 6.7-20.6 6.7-32l0-16c0-53.2-20-101.8-52.9-138.6 11.7-3.5 24.1-5.4 36.9-5.4 70.7 0 128 57.3 128 128l0 32c0 17.7-14.3 32-32 32l-86.7 0zM472 160a72 72 0 1 1 144 0 72 72 0 1 1 -144 0zM160 432c0-88.4 71.6-160 160-160s160 71.6 160 160l0 16c0 17.7-14.3 32-32 32l-256 0c-17.7 0-32-14.3-32-32l0-16z" />
							</svg>
							Lista de Utentes
						</a>
					</li>
					<li class="sidebar-item active">
						<a href="#">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
								<path
									d="M75 75L41 41C25.9 25.9 0 36.6 0 57.9L0 168c0 13.3 10.7 24 24 24l110.1 0c21.4 0 32.1-25.9 17-41l-30.8-30.8C155 85.5 203 64 256 64c106 0 192 86 192 192s-86 192-192 192c-40.8 0-78.6-12.7-109.7-34.4c-14.5-10.1-34.4-6.6-44.6 7.9s-6.6 34.4 7.9 44.6C151.2 495 201.7 512 256 512c141.4 0 256-114.6 256-256S397.4 0 256 0C185.3 0 121.3 28.7 75 75zm181 53c-13.3 0-24 10.7-24 24l0 104c0 6.4 2.5 12.5 7 17l72 72c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-65-65 0-94.1c0-13.3-10.7-24-24-24z" />
							</svg>
							Histórico
						</a>
					</li>
				</ul>
			</nav>
		</aside>

		<main class="main-content">
			<!--Patient Header-->
			<div class="paciente-header">
				<div class="paciente-header-info">
					<span class="paciente-nome">Histórico - <span id="nome-utente"></span></span>
					<span class="paciente-detalhes">
						Proc. <span id="processo"></span> &middot; Cama
						<span id="cama"></span> &middot;
						<span id="diagnostico"></span> &middot;
						<span id="dias-internado"></span> dia(s) internado
					</span>
				</div>
				<div class="paciente-header-actions">
					<button class="btn-header" id="btn-kardex">Kardex</button>
				</div>
			</div>

			<!--Content-->
			<div class="content-area">
				<div class="historico-card">
					<div class="historico-card-header">Histórico de Prescrições</div>
					<div class="historico-card-body">

						<!--Controls-->
						<div class="historico-controls">
							<div class="search-input-wrap">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
									<path
										d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
								</svg>
								<input type="text" id="search-input" placeholder="Pesquisar medicamento..." />
							</div>

							<select id="filtro-estado" class="filtro-select">
								<option value="todos">Todas</option>
								<option value="ATIVA">Ativas</option>
								<option value="SUSPENSA">Suspensas</option>
								<option value="TERMINADA">Terminadas</option>
							</select>
						</div>

						<!--Table-->
						<div class="historico-table-wrap">
							<table class="historico-table">
								<thead>
									<tr>
										<th>Medicamento</th>
										<th>Dose</th>
										<th>Via</th>
										<th>Início</th>
										<th>Fim (previsto)</th>
										<th>Duração</th>
										<th>Motivo</th>
										<th>SOS</th>
										<th>Estado</th>
									</tr>
								</thead>
								<tbody id="historico-tbody">
									<tr>
										<td colspan="10" class="td-loading">A carregar prescrições...</td>
									</tr>
								</tbody>
							</table>
						</div>

					</div>
				</div>
			</div>
		</main>
	</div>

	<script src="../../scripts/logout.js"></script>
	<script src="../../scripts/enfermeiro/enfermeiroTopBar.js"></script>
	<script src="../../scripts/enfermeiro/enfermeiroHistoricoPrescricoes.js"></script>
</body>

</html>
