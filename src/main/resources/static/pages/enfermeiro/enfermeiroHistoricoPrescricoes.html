<!doctype html>
<html lang="pt">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Histórico de Prescrições</title>
<style>
/* === ../../styles/enfermeiro/enfermeiroHistoricoPrescricoes.css === */
.main-container {
    display: flex;
    flex-grow: 1;
    align-items: stretch;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

/*Top Bar*/
.topbar-user {
    background: transparent;
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    padding: 0;
    border-radius: 0;
    letter-spacing: 0.04em;
}

.topbar-page {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.06em;
}

/*Side Bar*/
.sidebar {
    width: 210px;
    background: var(--surface);
    padding: 12px 0;
    flex-shrink: 0;
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.sidebar-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    transition: background 0.2s;
}

.sidebar-item a:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--accent);
}

.sidebar-item.active a {
    background: var(--accent);
    color: var(--surface);
}

.sidebar-item svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    fill: currentColor;
}

.sidebar-section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.9);
    padding: 20px 18px 8px;
    text-transform: uppercase;
}

/*Patient Header Bar*/
.paciente-header {
    background: var(--surface);
    margin: 14px 14px 0 14px;
    border-radius: 4px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.paciente-header-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.paciente-nome {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
}

.paciente-detalhes {
    font-size: 12px;
    color: var(--muted);
}

.paciente-header-actions {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
}

.btn-header {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 16px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
}

.btn-header:hover {
    background: var(--accent);
    color: var(--surface);
}

/*Content Area*/
.content-area {
    margin: 14px;
    flex: 1;
}

/*Historico Card*/
.historico-card {
    background: var(--surface);
    border-radius: 6px;
}

.historico-card-header {
    background: #1a3f5e;
    border-radius: 6px 6px 0 0;
    padding: 12px 18px;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
}

.historico-card-body {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/*Controls*/
.historico-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.search-input-wrap {
    display: flex;
    align-items: center;
    background: #1a3f5e;
    border-radius: 4px;
    padding: 8px 12px;
    gap: 8px;
    flex: 1;
    min-width: 200px;
}

.search-input-wrap input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 13px;
    width: 100%;
}

.search-input-wrap input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

.search-input-wrap svg {
    fill: var(--muted);
    width: 14px;
    height: 14px;
    flex-shrink: 0;
}

.filtro-select {
    background: #1a3f5e;
    border: none;
    border-radius: 4px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px;
    cursor: pointer;
    appearance: auto;
}

.filtro-select:focus {
    outline: 2px solid var(--muted);
}

.filtro-select option {
    background: #1a3f5e;
}

/*Table*/
.historico-table-wrap {
    overflow-x: auto;
    border-radius: 4px;
}

.historico-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-family: var(--sans);
    table-layout: auto;
}

.historico-table thead tr {
    background: #1a3f5e;
}

.historico-table thead th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.07em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    text-align: left;
    border-bottom: 1px solid var(--border);
}

.historico-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
}

.historico-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.06);
}

.historico-table tbody td {
    padding: 10px 14px;
    color: var(--text);
    vertical-align: middle;
}

.td-loading {
    text-align: center;
    color: rgba(255, 255, 255, 0.5);
    padding: 32px !important;
}

/*Status badges*/
.badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
}

.badge-ativa {
    background: rgba(80, 200, 120, 0.2);
    color: #50c878;
    border: 1px solid #50c878;
}

.badge-inativa {
    background: rgba(160, 160, 160, 0.2);
    color: #aaa;
    border: 1px solid #aaa;
}

.badge-sos {
    background: rgba(240, 80, 80, 0.2);
    color: #f05050;
    border: 1px solid #f05050;
}

.motivo-inativo {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
}

/*Pagination*/
.paginacao {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 0 4px;
}

.paginacao-tamanho {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
}

.paginacao-tamanho select {
    background: #1a3f5e;
    border: 1.5px solid var(--muted);
    color: var(--accent);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
}

.paginacao-tamanho select:hover {
    background: #1e4d6b;
}

.paginacao-tamanho select option {
    background: #1a3f5e;
}

.paginacao-paginas {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
}

.btn-pagina {
    min-width: 32px;
    height: 32px;
    padding: 0 10px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.btn-pagina:hover {
    border-color: var(--muted);
    color: var(--accent);
}

.btn-pagina.ativo {
    background: var(--muted);
    border-color: var(--muted);
    color: #1a3f5e;
}

</style>
<style>
/* === ../../styles/rootAndBody.css === */
*,
*::before,
*::after {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

:root {
	--bg: #ffffff;
	--surface: #2a6f97;
	--surface2: #2a6f97;
	--panel: #2a6f97;
	--card: #2a6f97;
	--text: #e8f4f8;
	--muted: #a8d4e6;
	--accent: #ffffff;
	--sidebar-bg: #2a6f97;
	--sidebar-hover: #ffffff;
	--border: rgba(255, 255, 255, 0.12);
	--mono: "IBM Plex Mono", monospace;
	--sans: "IBM Plex Sans", sans-serif;
}

body {
	font-family: var(--sans);
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
	display: flex;
	flex-direction: column;
	margin: auto;
}


/* === ../../styles/topBar.css === */
/*Top bar*/
.topbar {
	background: var(--surface);
	padding: 0 24px;
	height: 52px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	border-bottom: 1px solid var(--border);
}
.topbar-brand {
	font-size: 13px;
	color: var(--muted);
	letter-spacing: 0.06em;
}
.topbar-right {
	display: flex;
	align-items: center;
	gap: 16px;
}
.topbar-user {
	background: rgb(107, 56, 56);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.06em;
}
.btn-sair {
	background: transparent;
	border: 2px solid var(--accent);
	color: var(--accent);
	font-family: var(--sans);
	font-size: 13px;
	font-weight: 700;
	letter-spacing: 0.1em;
	padding: 5px 18px;
	cursor: pointer;
    border-radius: 10px;
	transition:
		background 0.15s,
		color 0.15s;
}
.btn-sair:hover {
	background: var(--accent);
	color: var(--surface);
}

</style>
</head>

<body>
	<!--Top Bar-->
	<div class="topbar">
		<span class="topbar-page">Histórico de Prescrições</span>
		<div class="topbar-right">
			<span class="topbar-user">Enf. <span id="nome-enfermeiro"></span><span id="turno-wrapper"> | Turno:
				<span id="turno"></span></span></span>
			<button class="btn-sair" onclick="logout()">SAIR</button>
		</div>
	</div>

	<!--Side Bar + Main-->
	<div class="main-container">
		<aside class="sidebar">
			<nav>
				<div class="sidebar-section-label">Principal</div>
				<ul>
					<li class="sidebar-item">
						<a href="enfermeiroDashboard">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
								<path
									d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1zm16 50.1L96 199.7 96 448c0 8.8 7.2 16 16 16l48 0 0-104c0-39.8 32.2-72 72-72l48 0c39.8 0 72 32.2 72 72l0 104 48 0c8.8 0 16-7.2 16-16l0-248.3-160-143.4zM208 464l96 0 0-104c0-13.3-10.7-24-24-24l-48 0c-13.3 0-24 10.7-24 24l0 104z" />
							</svg>
							Home
						</a>
					</li>
					<li class="sidebar-item">
						<a href="enfermeiroListaUtentes">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
								<path
									d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32zm521.3 64c4.3-9.8 6.7-20.6 6.7-32l0-16c0-53.2-20-101.8-52.9-138.6 11.7-3.5 24.1-5.4 36.9-5.4 70.7 0 128 57.3 128 128l0 32c0 17.7-14.3 32-32 32l-86.7 0zM472 160a72 72 0 1 1 144 0 72 72 0 1 1 -144 0zM160 432c0-88.4 71.6-160 160-160s160 71.6 160 160l0 16c0 17.7-14.3 32-32 32l-256 0c-17.7 0-32-14.3-32-32l0-16z" />
							</svg>
							Lista de Utentes
						</a>
					</li>
					<li class="sidebar-item active">
						<a href="#">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
								<path
									d="M75 75L41 41C25.9 25.9 0 36.6 0 57.9L0 168c0 13.3 10.7 24 24 24l110.1 0c21.4 0 32.1-25.9 17-41l-30.8-30.8C155 85.5 203 64 256 64c106 0 192 86 192 192s-86 192-192 192c-40.8 0-78.6-12.7-109.7-34.4c-14.5-10.1-34.4-6.6-44.6 7.9s-6.6 34.4 7.9 44.6C151.2 495 201.7 512 256 512c141.4 0 256-114.6 256-256S397.4 0 256 0C185.3 0 121.3 28.7 75 75zm181 53c-13.3 0-24 10.7-24 24l0 104c0 6.4 2.5 12.5 7 17l72 72c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-65-65 0-94.1c0-13.3-10.7-24-24-24z" />
							</svg>
							Histórico
						</a>
					</li>
				</ul>
			</nav>
		</aside>

		<main class="main-content">
			<!--Patient Header-->
			<div class="paciente-header">
				<div class="paciente-header-info">
					<span class="paciente-nome">Histórico - <span id="nome-utente"></span></span>
					<span class="paciente-detalhes">
						Proc. <span id="processo"></span> &middot; Cama
						<span id="cama"></span> &middot;
						<span id="diagnostico"></span> &middot;
						<span id="dias-internado"></span> dia(s) internado
					</span>
				</div>
				<div class="paciente-header-actions">
					<button class="btn-header" id="btn-kardex">Kardex</button>
				</div>
			</div>

			<!--Content-->
			<div class="content-area">
				<div class="historico-card">
					<div class="historico-card-header">Histórico de Prescrições</div>
					<div class="historico-card-body">

						<!--Controls-->
						<div class="historico-controls">
							<div class="search-input-wrap">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
									<path
										d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
								</svg>
								<input type="text" id="search-input" placeholder="Pesquisar medicamento..." />
							</div>

							<select id="filtro-estado" class="filtro-select">
								<option value="todos">Todas</option>
								<option value="ATIVA">Ativas</option>
								<option value="SUSPENSA">Suspensas</option>
								<option value="TERMINADA">Terminadas</option>
							</select>
						</div>

						<!--Table-->
						<div class="historico-table-wrap">
							<table class="historico-table">
								<thead>
									<tr>
										<th>Medicamento</th>
										<th>Dose</th>
										<th>Via</th>
										<th>Início</th>
										<th>Fim (previsto)</th>
										<th>Duração</th>
										<th>Motivo</th>
										<th>SOS</th>
										<th>Estado</th>
									</tr>
								</thead>
								<tbody id="historico-tbody">
									<tr>
										<td colspan="10" class="td-loading">A carregar prescrições...</td>
									</tr>
								</tbody>
							</table>
						</div>

					</div>
				</div>
			</div>
		</main>
	</div>

	<script src="../../scripts/logout.js"></script>
	<script src="../../scripts/enfermeiro/enfermeiroTopBar.js"></script>
	<script src="../../scripts/enfermeiro/enfermeiroHistoricoPrescricoes.js"></script>
</body>

</html>
