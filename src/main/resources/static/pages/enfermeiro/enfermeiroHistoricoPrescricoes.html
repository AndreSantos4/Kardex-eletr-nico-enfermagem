<!doctype html>
<html lang="pt">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Histórico de Prescrições</title>
	<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: { extend: {
				colors: { primary: "#2a6f97", secondary: "#a8d4e6", "bg-dark": "#1a3f5e", text: "#e8f4f8", "input-bg": "#1e4d6b", ok: "#2e9e6e", alertas: "hsl(0, 98%, 36%)" },
				fontFamily: { sans: ['"Inter"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"] },
			}},
		};
	</script>
</head>

<body class="font-sans bg-white text-text min-h-screen flex flex-col m-0 p-0 box-border">
	<div class="bg-primary px-6 h-[52px] flex items-center justify-between border-b border-white/10">
		<span class="text-[13px] text-text tracking-wider">Histórico de Prescrições</span>
		<div class="flex items-center gap-4">
			<span class="bg-transparent text-white text-[13px] font-bold tracking-[0.04em]">Enf. <span id="nome-enfermeiro"></span><span id="turno-wrapper"> | Turno: <span id="turno"></span></span></span>
			<button class="bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-widest px-[18px] py-[5px] cursor-pointer rounded-[10px] hover:bg-white hover:text-primary transition-colors" onclick="logout()">SAIR</button>
		</div>
	</div>

	<div class="flex flex-grow items-stretch">
		<aside class="w-[210px] bg-primary py-3 shrink-0 [&_ul]:list-none [&_ul]:p-0 [&_ul]:m-0 [&_.sidebar-item_a]:flex [&_.sidebar-item_a]:items-center [&_.sidebar-item_a]:gap-3 [&_.sidebar-item_a]:px-[18px] [&_.sidebar-item_a]:py-3 [&_.sidebar-item_a]:no-underline [&_.sidebar-item_a]:text-text [&_.sidebar-item_a]:text-sm [&_.sidebar-item_a]:transition-colors [&_.sidebar-item_a:hover]:bg-white/15 [&_.sidebar-item_a:hover]:text-white [&_.sidebar-item.active_a]:bg-white [&_.sidebar-item.active_a]:text-primary [&_.sidebar-item_svg]:w-[18px] [&_.sidebar-item_svg]:h-[18px] [&_.sidebar-item_svg]:shrink-0 [&_.sidebar-item_svg]:fill-current">
			<nav>
				<div class="text-[11px] font-extrabold tracking-[0.1em] text-white/90 px-[18px] pt-5 pb-2 uppercase">Principal</div>
				<ul>
					<li class="sidebar-item"><a href="enfermeiroDashboard"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1z"/></svg>Home</a></li>
					<li class="sidebar-item"><a href="enfermeiroListaUtentes"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32z"/></svg>Lista de Utentes</a></li>
					<li class="sidebar-item active"><a href="#"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M75 75L41 41C25.9 25.9 0 36.6 0 57.9L0 168c0 13.3 10.7 24 24 24l110.1 0c21.4 0 32.1-25.9 17-41l-30.8-30.8C155 85.5 203 64 256 64c106 0 192 86 192 192s-86 192-192 192c-40.8 0-78.6-12.7-109.7-34.4c-14.5-10.1-34.4-6.6-44.6 7.9s-6.6 34.4 7.9 44.6C151.2 495 201.7 512 256 512c141.4 0 256-114.6 256-256S397.4 0 256 0C185.3 0 121.3 28.7 75 75z"/></svg>Histórico</a></li>
				</ul>
			</nav>
		</aside>

		<main class="flex-1 flex flex-col min-w-0">
			<div class="bg-primary mx-[14px] mt-[14px] rounded px-4 py-2.5 flex items-center justify-between gap-3">
				<div class="flex flex-col gap-0.5">
					<span class="text-sm font-bold text-white">Histórico - <span id="nome-utente"></span></span>
					<span class="text-xs text-secondary">
						Proc. <span id="processo"></span> &middot; Cama
						<span id="cama"></span> &middot;
						<span id="diagnostico"></span> &middot;
						<span id="dias-internado"></span> dia(s) internado
					</span>
				</div>
				<div class="flex gap-2.5 shrink-0">
					<button class="bg-transparent border-2 border-white text-white text-xs font-bold px-4 py-1 cursor-pointer rounded-[10px] hover:bg-white hover:text-primary transition-colors" id="btn-kardex">Kardex</button>
				</div>
			</div>

			<div class="m-[14px] flex-1">
				<div class="bg-primary rounded-md [&_.paginacao]:flex [&_.paginacao]:items-center [&_.paginacao]:justify-between [&_.paginacao]:gap-2 [&_.paginacao]:py-3 [&_.paginacao]:pt-3 [&_.paginacao]:pb-1 [&_.paginacao-tamanho]:flex [&_.paginacao-tamanho]:items-center [&_.paginacao-tamanho]:gap-2 [&_.paginacao-tamanho]:text-secondary [&_.paginacao-tamanho]:font-sans [&_.paginacao-tamanho]:text-xs [&_.paginacao-tamanho]:font-semibold [&_.paginacao-tamanho_select]:bg-bg-dark [&_.paginacao-tamanho_select]:border-[1.5px] [&_.paginacao-tamanho_select]:border-secondary [&_.paginacao-tamanho_select]:text-white [&_.paginacao-tamanho_select]:font-bold [&_.paginacao-tamanho_select]:px-2 [&_.paginacao-tamanho_select]:py-1 [&_.paginacao-tamanho_select]:rounded [&_.paginacao-tamanho_select]:cursor-pointer [&_.paginacao-tamanho_select:hover]:bg-input-bg [&_.paginacao-tamanho_select_option]:bg-bg-dark [&_.paginacao-paginas]:flex [&_.paginacao-paginas]:items-center [&_.paginacao-paginas]:gap-1 [&_.paginacao-paginas]:ml-auto [&_.btn-pagina]:min-w-[32px] [&_.btn-pagina]:h-8 [&_.btn-pagina]:px-2.5 [&_.btn-pagina]:bg-transparent [&_.btn-pagina]:border-[1.5px] [&_.btn-pagina]:border-white/10 [&_.btn-pagina]:rounded [&_.btn-pagina]:text-secondary [&_.btn-pagina]:text-xs [&_.btn-pagina]:font-bold [&_.btn-pagina]:tracking-wider [&_.btn-pagina]:cursor-pointer [&_.btn-pagina]:transition-colors [&_.btn-pagina:hover]:border-secondary [&_.btn-pagina:hover]:text-white [&_.btn-pagina.ativo]:bg-secondary [&_.btn-pagina.ativo]:border-secondary [&_.btn-pagina.ativo]:text-bg-dark">
					<div class="bg-bg-dark rounded-t-md px-[18px] py-3 text-base font-bold text-white">Histórico de Prescrições</div>
					<div class="p-[18px] flex flex-col gap-[14px]">
						<div class="flex items-center gap-3 flex-wrap">
							<div class="flex items-center bg-bg-dark rounded px-3 py-2 gap-2 flex-1 min-w-[200px]">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="fill-secondary w-3.5 h-3.5 shrink-0"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>
								<input type="text" id="search-input" placeholder="Pesquisar medicamento..." class="bg-transparent border-0 outline-none text-white font-sans text-[13px] w-full placeholder:text-white/40" />
							</div>

							<select id="filtro-estado" class="bg-bg-dark border-0 rounded text-white font-sans text-[13px] px-3 py-2 cursor-pointer focus:outline focus:outline-2 focus:outline-secondary [&_option]:bg-bg-dark">
								<option value="todos">Todas</option>
								<option value="ATIVA">Ativas</option>
								<option value="SUSPENSA">Suspensas</option>
								<option value="TERMINADA">Terminadas</option>
							</select>
						</div>

						<div class="overflow-x-auto rounded">
							<table class="w-full border-collapse text-[13px] font-sans">
								<thead class="[&_tr]:bg-bg-dark [&_th]:px-3.5 [&_th]:py-2.5 [&_th]:text-[11px] [&_th]:font-extrabold [&_th]:tracking-[0.07em] [&_th]:text-secondary [&_th]:uppercase [&_th]:whitespace-nowrap [&_th]:text-left [&_th]:border-b [&_th]:border-white/10">
									<tr>
										<th>Medicamento</th>
										<th>Dose</th>
										<th>Via</th>
										<th>Início</th>
										<th>Fim (previsto)</th>
										<th>Duração</th>
										<th>Motivo</th>
										<th>SOS</th>
										<th>Estado</th>
									</tr>
								</thead>
								<tbody id="historico-tbody" class="[&_tr]:border-b [&_tr]:border-white/10 [&_tr]:transition-colors [&_tr:hover]:bg-white/[0.06] [&_td]:px-3.5 [&_td]:py-2.5 [&_td]:text-text [&_td]:align-middle [&_.td-loading]:text-center [&_.td-loading]:!text-white/50 [&_.td-loading]:!p-8 [&_.badge]:inline-block [&_.badge]:px-2.5 [&_.badge]:py-0.5 [&_.badge]:rounded-[20px] [&_.badge]:text-[11px] [&_.badge]:font-bold [&_.badge]:tracking-wider [&_.badge-ativa]:bg-[#50c878]/20 [&_.badge-ativa]:!text-[#50c878] [&_.badge-ativa]:border [&_.badge-ativa]:border-[#50c878] [&_.badge-inativa]:bg-[#aaa]/20 [&_.badge-inativa]:!text-[#aaa] [&_.badge-inativa]:border [&_.badge-inativa]:border-[#aaa] [&_.badge-sos]:bg-[#f05050]/20 [&_.badge-sos]:!text-[#f05050] [&_.badge-sos]:border [&_.badge-sos]:border-[#f05050] [&_.motivo-inativo]:text-[11px] [&_.motivo-inativo]:!text-white/50 [&_.motivo-inativo]:italic">
									<tr>
										<td colspan="10" class="td-loading">A carregar prescrições...</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>

	<script src="../../scripts/logout.js"></script>
	<script src="../../scripts/topBar.js"></script>
	<script src="../../scripts/enfermeiro/enfermeiroHistoricoPrescricoes.js"></script>
</body>

</html>
