<!doctype html>
<html lang="pt">

<head>
	<meta charset="UTF-8" />
	<title>Enfermeiro Chefe - Lista de Utentes</title>
	<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: { extend: {
				colors: { primary: "#2a6f97", secondary: "#a8d4e6", "bg-dark": "#1a3f5e", text: "#e8f4f8", "input-bg": "#1e4d6b", ok: "#2e9e6e", alertas: "hsl(0, 98%, 36%)" },
				fontFamily: { sans: ['"Inter"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"] },
			}},
		};
	</script>
</head>

<body class="font-sans bg-white text-text min-h-screen flex flex-col m-0 p-0 box-border">
	<div class="bg-primary px-6 h-[52px] flex items-center justify-between border-b border-white/10">
		<span class="text-[13px] text-secondary tracking-wider">Enfermeiro Chefe - Lista de Utentes</span>
		<div class="flex items-center gap-4">
			<span class="text-white text-[11px] font-bold px-2 py-0.5 rounded-sm tracking-wider">
				<span id="nome-chefe">—</span>
			</span>
			<button class="bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-widest px-[18px] py-[5px] cursor-pointer rounded-[10px] hover:bg-white hover:text-primary transition-colors" onclick="logout()">SAIR</button>
		</div>
	</div>

	<div class="flex flex-1">
		<nav class="w-[210px] shrink-0 bg-primary self-stretch py-3 [&_a]:no-underline [&_.sidebar-item]:flex [&_.sidebar-item]:items-center [&_.sidebar-item]:gap-2.5 [&_.sidebar-item]:px-[18px] [&_.sidebar-item]:py-2 [&_.sidebar-item]:text-[13.5px] [&_.sidebar-item]:text-secondary [&_.sidebar-item]:cursor-pointer [&_.sidebar-item:hover]:bg-white [&_.sidebar-item:hover]:text-primary [&_.sidebar-item.active]:bg-white [&_.sidebar-item.active]:text-primary [&_.sidebar-item_svg]:w-[18px] [&_.sidebar-item_svg]:h-[18px] [&_.sidebar-item_svg]:shrink-0 [&_.sidebar-item_svg]:fill-current">
			<div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-1.5 pb-1.5 uppercase">Principal</div>
			<a href="enfermeiroChefeDashboard"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1z"/></svg>Home</div></a>
			<a href="enfermeiroChefeListaUtentes"><div class="sidebar-item active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144z"/></svg>Lista de Utentes</div></a>
			<div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M416 224C398.3 224 384 209.7 384 192C384 174.3 398.3 160 416 160L576 160C593.7 160 608 174.3 608 192L608 352z"/></svg>Stock</div>
			<div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-3.5 pb-1.5 uppercase">Supervisão</div>
			<a href="enfermeiroChefeValidarPassagemTurno"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M448 96L439.4 96C428.4 76.9 407.7 64 384 64L256 64C232.3 64 211.6 76.9 200.6 96L192 96C156.7 96 128 124.7 128 160L128 512C128 547.3 156.7 576 192 576L448 576C483.3 576 512 547.3 512 512L512 160C512 124.7 483.3 96 448 96z"/></svg>Validar Turno</div></a>
			<div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-3.5 pb-1.5 uppercase">Cuidados</div>
			<div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M128 128C128 92.7 156.7 64 192 64L341.5 64C358.5 64 374.8 70.7 386.8 82.7L493.3 189.3z"/></svg>Relatórios</div>
			<a href="enfermeiroChefeGerirTurnos"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M534.6 182.6C547.1 170.1 547.1 149.8 534.6 137.3L470.6 73.3C461.4 64.1 447.7 61.4 435.7 66.4C423.7 71.4 416 83.1 416 96L416 128L256 128C150 128 64 214 64 320z"/></svg>Gestão de Turnos</div></a>
			<a href="enfermeiroChefeHistoricoTurnos"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M384 512L96 512c-53 0-96-43-96-96L0 96C0 43 43 0 96 0L400 0c26.5 0 48 21.5 48 48l0 288z"/></svg>Histórico de Turnos</div></a>
		</nav>

		<div class="flex-1 flex flex-col gap-[14px] py-[14px] pr-[14px] pl-4">
			<div class="bg-primary rounded px-5 py-[14px] flex items-center justify-between gap-4">
				<div>
					<h4 class="text-white text-[15px] font-bold tracking-wider m-0">Lista de Utentes - Serviço Internamento</h4>
					<p id="current-datetime-panel" class="text-xs text-secondary mt-0.5 font-mono m-0"></p>
				</div>
				<div class="flex items-center gap-2">
					<div class="flex items-center bg-white border border-white/10 rounded px-2.5 py-[5px] gap-1.5">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-3.5 h-3.5 fill-secondary shrink-0"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208z"/></svg>
						<input type="text" placeholder="Nome ou Processo" class="bg-transparent border-0 outline-none text-primary text-[13px] w-[180px] placeholder:text-secondary" />
					</div>
					<select name="estados" id="estados" class="bg-white border border-white/10 rounded text-primary text-xs font-semibold px-2.5 py-1.5 cursor-pointer outline-none">
						<option value="todos">Todos</option>
						<option value="internado">Internado</option>
						<option value="alta">Alta</option>
					</select>
				</div>
			</div>

			<div class="m-[14px] rounded-[5px] border border-primary [&_.btn-pagina]:min-w-[32px] [&_.btn-pagina]:h-8 [&_.btn-pagina]:px-2.5 [&_.btn-pagina]:bg-transparent [&_.btn-pagina]:border-[1.5px] [&_.btn-pagina]:border-primary [&_.btn-pagina]:rounded [&_.btn-pagina]:text-primary [&_.btn-pagina]:text-xs [&_.btn-pagina]:font-bold [&_.btn-pagina]:cursor-pointer [&_.btn-pagina:hover]:bg-secondary [&_.btn-pagina.ativo]:bg-primary [&_.btn-pagina.ativo]:border-primary [&_.btn-pagina.ativo]:text-white">
				<div class="lista-utentes-table w-full overflow-x-auto">
					<table class="lista-utentes w-full border-collapse text-[0.875rem] table-fixed">
						<thead class="bg-primary text-white text-center border-b border-white">
							<tr>
								<th class="w-[8%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Nº Processo</th>
								<th class="w-[14%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Nome</th>
								<th class="w-[6%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Cama</th>
								<th class="w-[18%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Diagnóstico</th>
								<th class="w-[14%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Médico</th>
								<th class="w-[10%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Admissão</th>
								<th class="w-[8%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Estado</th>
								<th class="w-[10%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Alertas</th>
								<th class="w-[12%] px-4 py-3 font-semibold text-[0.8rem] whitespace-nowrap">Ação</th>
							</tr>
						</thead>
						<tbody class="[&>tr]:bg-white [&>tr]:text-primary [&>tr]:border-b [&>tr]:border-[#2a5a8c] [&>tr:hover]:bg-text [&>tr>td]:px-4 [&>tr>td]:py-3 [&>tr>td]:align-middle [&>tr>td]:text-center"></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<script src="../../scripts/logout.js"></script>
	<script src="../../scripts/topBar.js"></script>
	<script src="../../scripts/enfermeiroChefe/enfermeiroChefeListaUtentes.js"></script>
</body>

</html>
