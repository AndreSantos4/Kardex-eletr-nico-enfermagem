<div class="popup-stock-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000] font-sans" id="popup-registar-stock" style="display: none;">
	<div class="popup-stock-box bg-primary rounded-[10px] w-full max-w-[520px] shadow-[0_8px_32px_rgba(0,0,0,0.4)] overflow-hidden">
		<div class="popup-stock-header bg-bg-dark px-5 py-[14px] flex items-center justify-between text-base font-bold text-white">
			<span>Registar Entrada de Stock</span>
			<button class="popup-stock-close bg-[#c0392b] border-0 text-white text-sm font-bold w-8 h-8 rounded-full cursor-pointer flex items-center justify-center hover:bg-[#e74c3c] transition-colors" onclick="fecharPopupRegistarStock()">&#10005;</button>
		</div>
		<div class="popup-stock-content px-6 pt-[22px] pb-6">
			<form id="form-registar-stock" onsubmit="submeterRegistarStock(event)" class="flex flex-col gap-4 [&_.popup-stock-field]:flex [&_.popup-stock-field]:flex-col [&_.popup-stock-field]:gap-2 [&_.popup-stock-label]:text-[11px] [&_.popup-stock-label]:font-extrabold [&_.popup-stock-label]:tracking-[0.07em] [&_.popup-stock-label]:text-white [&_.popup-stock-label]:uppercase [&_select]:bg-white [&_select]:border-[1.5px] [&_select]:border-secondary/40 [&_select]:rounded-full [&_select]:text-bg-dark [&_select]:text-[13px] [&_select]:font-medium [&_select]:px-[18px] [&_select]:py-[11px] [&_select]:w-full [&_select]:cursor-pointer [&_select:focus]:outline-none [&_select:focus]:border-secondary [&_input]:bg-white [&_input]:border-[1.5px] [&_input]:border-secondary/40 [&_input]:rounded-full [&_input]:text-bg-dark [&_input]:text-[13px] [&_input]:font-medium [&_input]:px-[18px] [&_input]:py-[11px] [&_input]:w-full [&_input]:cursor-pointer [&_input:focus]:outline-none [&_input:focus]:border-secondary">
				<div class="popup-stock-field">
					<label class="popup-stock-label">MEDICAMENTO *</label>
					<select id="medicamento-stock" class="popup-stock-select">
						<option value="" disabled selected>A carregar medicamentos...</option>
					</select>
				</div>
				<div class="popup-stock-field">
					<label class="popup-stock-label">QUANTIDADE *</label>
					<input type="number" id="quantidade-stock" class="popup-stock-input" placeholder="50" min="1" />
				</div>
				<div class="popup-stock-actions flex gap-3 mt-1">
					<button type="button" class="btn-cancelar-stock flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-[11px] rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors" onclick="fecharPopupRegistarStock()">CANCELAR</button>
					<button type="submit" class="btn-confirmar-stock flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-[11px] rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors">REGISTAR ENTRADA</button>
				</div>
			</form>
		</div>
	</div>
</div>
