<link rel="stylesheet" href="../../../styles/popups.css" />
<link rel="stylesheet" href="../../../styles/enfermeiroChefe/popups/enfermeiroChefeEditarTurno.css" />

<div class="pop-up-editar-turno" style="display: none">
  <div class="pop-up pop-up--editar-turno">
    <div class="pop-up-header">
      <div class="title">
        <h3>Editar Turno</h3>
      </div>
      <div class="icon">
        <a href="" class="cross" onclick="fecharPopUpEditarTurno(); return false;">
          <svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
            <path fill="rgb(220, 49, 26)"
              d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
          </svg>
        </a>
      </div>
    </div>

    <div class="pop-up-main">
      <form id="form-editar-turno" onsubmit="submeterEditarTurno(event)">
        <input type="hidden" id="et-turno-id" />

        <div class="form-row">
          <div class="form-group-full">
            <label for="et-tipo">TIPO DE TURNO *</label>
            <div class="select-wrap">
              <select id="et-tipo" name="tipo" required onchange="onTipoTurnoEditarChange(this.value)">
                <option value="MANHA">Manhã (08h-16h)</option>
                <option value="TARDE">Tarde (16h-00h)</option>
                <option value="NOITE">Noite (00h-08h)</option>
                <option value="PERSONALIZADO">Personalizado</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="et-hora-inicio">HORA DE INICIO *</label>
            <input type="time" id="et-hora-inicio" name="horaInicio" value="08:00" required readonly />
          </div>
          <div class="form-group">
            <label for="et-hora-fim">HORA FIM *</label>
            <input type="time" id="et-hora-fim" name="horaFim" value="16:00" required readonly />
          </div>
        </div>

        <div class="form-group-full">
          <label>ENFERMEIROS DISPONÍVEIS *</label>
          <div class="et-enfermeiros-box" id="et-enfermeiros-box">
            <div class="et-loading">A carregar enfermeiros...</div>
          </div>
        </div>

        <div class="form-group-full">
          <label for="et-observacoes">OBSERVAÇÕES</label>
          <textarea id="et-observacoes" name="observacoes" placeholder="Notas sobre o turno.." rows="3"></textarea>
        </div>

        <div class="warning-box" id="et-errorBox" style="display: none">
          <p id="et-errorMsg">Erro ao editar turno.</p>
        </div>

        <div class="buttons">
          <input type="button" value="Eliminar Turno" class="btn-eliminar" onclick="eliminarTurno()" />
          <input type="button" value="Cancelar" class="btn-cancelar" onclick="fecharPopUpEditarTurno()" />
          <button type="button" id="btn-atribuir-utentes-turno" class="btn-primary">
            Atribuir Utentes
          </button>
          <input type="submit" value="Concluir" />
        </div>

      </form>
    </div>
  </div>
</div>
