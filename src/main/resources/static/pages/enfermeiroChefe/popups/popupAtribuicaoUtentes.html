<div class="popup-atribuicao-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000] font-sans" id="popup-atribuicao-utentes" style="display: none;">
	<div class="popup-atribuicao-box bg-primary rounded-[10px] w-full max-w-[900px] shadow-[0_8px_32px_rgba(0,0,0,0.4)] overflow-hidden">
		<div class="popup-atribuicao-header bg-bg-dark px-6 py-[18px] flex items-center justify-between text-xl font-bold text-white">
			<span>Atribuição de Utentes — <span id="atribuicao-turno-info">Turno</span></span>
			<button class="popup-atribuicao-close bg-[#c0392b] border-0 text-white text-base font-bold w-[38px] h-[38px] rounded-full cursor-pointer flex items-center justify-center hover:bg-[#e74c3c] transition-colors" onclick="fecharPopupAtribuicaoUtentes()">&#10005;</button>
		</div>
		<div class="popup-atribuicao-content px-6 pt-[22px] pb-6 flex flex-col gap-4">
			<p class="popup-atribuicao-subtitle text-white text-sm font-semibold m-0">Arraste ou selecione o enfermeiro responsável por cada utente neste turno.</p>
			<form id="form-atribuicao-utentes" onsubmit="submeterAtribuicaoUtentes(event)" class="flex flex-col gap-[18px]">
				<div class="popup-atribuicao-table-wrap bg-white rounded-lg overflow-hidden shadow-[0_2px_8px_rgba(0,0,0,0.15)]">
					<table class="popup-atribuicao-table w-full border-collapse text-[13px]">
						<thead>
							<tr class="bg-white border-b-[1.5px] border-[#e0e6ec]">
								<th class="text-left px-[18px] py-[14px] font-bold text-bg-dark text-[13px]">Utente</th>
								<th class="text-left px-[18px] py-[14px] font-bold text-bg-dark text-[13px]">Cama</th>
								<th class="text-left px-[18px] py-[14px] font-bold text-bg-dark text-[13px]">Diagnóstico</th>
								<th class="text-left px-[18px] py-[14px] font-bold text-bg-dark text-[13px]">Enfermeiro Responsável</th>
							</tr>
						</thead>
						<tbody id="atribuicoes-tbody" class="[&>tr]:border-b [&>tr]:border-[#f0f4f8] [&>tr:last-child]:border-0 [&>tr>td]:px-[18px] [&>tr>td]:py-[14px] [&>tr>td]:text-bg-dark [&>tr>td]:align-middle [&_.utente-nome]:font-bold [&_.utente-nome]:block [&_.utente-nome]:leading-[1.3] [&_.utente-processo]:text-[#6b7d86] [&_.utente-processo]:text-xs [&_.utente-processo]:block [&_.utente-processo]:leading-[1.3] [&_.popup-atribuicao-select]:bg-white [&_.popup-atribuicao-select]:border-[1.5px] [&_.popup-atribuicao-select]:border-[#c1c7ce] [&_.popup-atribuicao-select]:rounded-md [&_.popup-atribuicao-select]:text-bg-dark [&_.popup-atribuicao-select]:text-[13px] [&_.popup-atribuicao-select]:font-medium [&_.popup-atribuicao-select]:px-3 [&_.popup-atribuicao-select]:py-2 [&_.popup-atribuicao-select]:w-full [&_.popup-atribuicao-select]:cursor-pointer">
							<tr>
								<td colspan="4" class="atribuicao-empty text-center !p-7 !text-[#6b7d86] italic">A carregar utentes...</td>
							</tr>
						</tbody>
					</table>
				</div>
				<div class="popup-atribuicao-actions flex gap-3 justify-end mt-1">
					<button type="button" class="btn-cancelar-atribuicao bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] px-[22px] py-2.5 rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors" onclick="fecharPopupAtribuicaoUtentes()">CANCELAR</button>
					<button type="submit" class="btn-confirmar-atribuicao bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] px-[22px] py-2.5 rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors">GUARDAR ATRIBUIÇÕES</button>
				</div>
			</form>
		</div>
	</div>
</div>
