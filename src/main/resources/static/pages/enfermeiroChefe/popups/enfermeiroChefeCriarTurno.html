<link rel="stylesheet" href="../../../styles/popups.css" />
<link rel="stylesheet" href="../../../styles/enfermeiroChefe/popups/enfermeiroChefeCriarTurno.css" />

<div class="pop-up-criar-turno" style="display: none">
  <div class="pop-up pop-up--criar-turno">
    <div class="pop-up-header">
      <div class="title">
        <h3>Criar Turno</h3>
      </div>
      <div class="icon">
        <a href="" class="cross" onclick="fecharPopUpCriarTurno(); return false;">
          <svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
            <path fill="rgb(220, 49, 26)"
              d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
          </svg>
        </a>
      </div>
    </div>

    <div class="pop-up-main">
      <form id="form-criar-turno" onsubmit="submeterCriarTurno(event)">

        <div class="form-row">
          <div class="form-group">
            <label for="ct-tipo">TIPO DE TURNO *</label>
            <div class="select-wrap">
              <select id="ct-tipo" name="tipo" required>
                <option value="MANHA">Manhã (08h-16h)</option>
                <option value="TARDE">Tarde (16h-00h)</option>
                <option value="NOITE">Noite (00h-08h)</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="ct-data">DATA *</label>
            <input type="date" id="ct-data" name="data" required />
          </div>
        </div>

        <div class="form-group-full">
          <label>ENFERMEIROS DISPONÍVEIS *</label>
          <div class="ct-enfermeiros-box" id="ct-enfermeiros-box">
            <div class="ct-loading">A carregar enfermeiros...</div>
          </div>
        </div>

        <div class="form-group-full">
          <label for="ct-observacoes">OBSERVAÇÕES</label>
          <textarea id="ct-observacoes" name="observacoes" placeholder="Notas sobre o turno.." rows="3"></textarea>
        </div>

        <div class="warning-box" id="ct-errorBox" style="display: none">
          <p id="ct-errorMsg">Erro ao criar turno.</p>
        </div>

        <div class="buttons">
          <input type="button" value="Cancelar" class="btn-cancelar" onclick="fecharPopUpCriarTurno()" />
          <input type="submit" value="Criar Turno" />
        </div>

      </form>
    </div>
  </div>
</div>
