<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Recuperar Password</title>
    <link rel="stylesheet" href="../../styles/popups/notificacao.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: {
          colors: { primary: "#2a6f97", secondary: "#a8d4e6", "bg-dark": "#1a3f5e", text: "#e8f4f8", "input-bg": "#1e4d6b", ok: "#2e9e6e", alertas: "hsl(0, 98%, 36%)" },
          fontFamily: { sans: ['"Inter"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"] },
        }},
      };
    </script>
  </head>
  <body class="font-sans text-[13px] bg-[#f0f4f8] text-[#1a2a3a] m-0 p-0 box-border">
    <div id="ecra-login" class="flex items-center justify-center min-h-screen bg-primary">
      <div class="login-caixa bg-white rounded-lg w-[380px] shadow-[0_4px_24px_rgba(0,0,0,0.25)] overflow-hidden">
        <div class="login-cabecalho bg-[#174A6A] text-white px-6 py-5 text-center">
          <div class="login-titulo text-lg font-bold tracking-[1px]">Clínica Psiquiátrica de S. Mateus</div>
        </div>

        <div class="login-corpo p-6 flex flex-col gap-[14px]">
          <div id="form-wrapper">
            <p class="login-descricao text-[0.85rem] text-[#666] mb-4 leading-[1.4]">
              Defina a sua nova password. Deve ter no mínimo 8 caracteres.
            </p>

            <form onsubmit="submeterNovaPassword(event)" id="form-nova-password">
              <div class="login-campo mb-[14px]">
                <label class="block text-[11px] font-semibold text-[#6a8aaa] mb-1 uppercase tracking-[0.5px]">Nova Password</label>
                <input type="password" id="nova-password" minlength="8" required class="w-full border border-[#d0d9e5] rounded px-2.5 py-2 text-[13px] focus:outline-none focus:border-[#2d6aad]" />
              </div>

              <div class="login-campo mb-[14px]">
                <label class="block text-[11px] font-semibold text-[#6a8aaa] mb-1 uppercase tracking-[0.5px]">Confirmar Password</label>
                <input type="password" id="confirmar-password" minlength="8" required class="w-full border border-[#d0d9e5] rounded px-2.5 py-2 text-[13px] focus:outline-none focus:border-[#2d6aad]" />
              </div>

              <p id="msgError" class="text-[#c0392b] text-[0.82rem] min-h-[1.2em] mt-1 mb-2"></p>

              <input type="submit" value="ALTERAR PASSWORD" class="login-botao w-full py-[11px] bg-[#174A6A] text-white border-0 rounded text-[13px] font-bold tracking-[1px] cursor-pointer mt-1 hover:bg-[#2d6aad]" id="btn-submit" />
            </form>

            <div class="login-sucesso hidden text-center py-4" id="sucesso">
              <p class="text-[#2e7d32] text-[0.95rem]">Password alterada com sucesso!</p>
              <p class="text-[#2e7d32] text-[0.95rem]">
                <a href="login.html" style="color: inherit; font-weight: bold">Voltar ao login</a>
              </p>
            </div>
          </div>

          <div class="login-aviso-legal text-center text-[10px] text-[#6a8aaa] leading-[1.5]">
            Acesso restrito a profissionais autorizados.<br />
            Todos os acessos são registados
          </div>
        </div>
      </div>
    </div>

    <script src="../../scripts/recuperarPassword.js"></script>
    <div id="notificacoes-container"></div>
    <script src="../../scripts/notificacao.js"></script>
  </body>
</html>
