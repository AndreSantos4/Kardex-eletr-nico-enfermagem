<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Recuperar Password</title>
    <link href="../../styles/login.css" rel="stylesheet" type="text/css" />
    <style>
      .login-descricao {
        font-size: 0.85rem;
        color: #666;
        margin-bottom: 1rem;
        line-height: 1.4;
      }
      .login-sucesso {
        display: none;
        text-align: center;
        padding: 1rem 0;
      }
      .login-sucesso p {
        color: #2e7d32;
        font-size: 0.95rem;
      }
      #msgError {
        color: #c0392b;
        font-size: 0.82rem;
        min-height: 1.2em;
        margin: 0.25rem 0 0.5rem;
      }
    </style>
  </head>
  <body>
    <div id="ecra-login">
      <div class="login-caixa">
        <div class="login-cabecalho">
          <div class="login-titulo">Clínica Psiquiátrica de S. Mateus</div>
        </div>

        <div class="login-corpo">
          <div id="form-wrapper">
            <p class="login-descricao">
              Defina a sua nova password. Deve ter no mínimo 8 caracteres.
            </p>

            <form onsubmit="submeterNovaPassword(event)" id="form-nova-password">
              <div class="login-campo">
                <label>Nova Password</label>
                <input
                  type="password"
                  id="nova-password"
                  minlength="8"
                  required
                />
              </div>

              <div class="login-campo">
                <label>Confirmar Password</label>
                <input
                  type="password"
                  id="confirmar-password"
                  minlength="8"
                  required
                />
              </div>

              <p id="msgError"></p>

              <input
                type="submit"
                value="ALTERAR PASSWORD"
                class="login-botao"
                id="btn-submit"
              />
            </form>

            <div class="login-sucesso" id="sucesso">
              <p>Password alterada com sucesso!</p>
              <p>
                <a href="login.html" style="color: inherit; font-weight: bold"
                  >Voltar ao login</a
                >
              </p>
            </div>
          </div>

          <div class="login-aviso-legal">
            Acesso restrito a profissionais autorizados.<br />
            Todos os acessos são registados
          </div>
        </div>
      </div>
    </div>

    <script src="../../scripts/recuperarPassword.js"></script>
  </body>
</html>
