<!DOCTYPE html>
<html lang="pt">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	
	<link rel="stylesheet" href="../../styles/popups/notificacao.css" />
	<title>Médico - Notas Clínicas</title>
<style>
/* === ../../styles/medico/medicoNotasClinicas.css === */
:root {
    --primary: #2a6f97;
    --secondary: #a8d4e6;
    --white: #ffffff;
    --text: #e8f4f8;
    --bg-dark: #1a3f5e;
    --border: rgba(255, 255, 255, 0.12);
    --sans: "IBM Plex Sans", sans-serif;
}

/* ===== Body ===== */
body {
    font-family: var(--sans);
    color: var(--text);
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--white);
}

.main-container {
    display: flex;
    flex-grow: 1;
    align-items: stretch;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* ===== Top Bar ===== */
.topbar {
    height: 52px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
}

.topbar-page {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.06em;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.topbar-user {
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
}

.btn-sair {
    background: transparent;
    border: 2px solid var(--white);
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.01em;
    padding: 5px 18px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
}

.btn-sair:hover {
    background: var(--white);
    color: var(--primary);
}

/* ===== Sidebar ===== */
.sidebar {
    width: 210px;
    background: var(--primary);
    padding: 12px 0;
    border-top: 1px solid var(--white);
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.sidebar-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    transition: background 0.2s;
}

.sidebar-item a:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--white);
}

.sidebar-item.active a {
    background: var(--white);
    color: var(--primary);
    font-weight: 700;
}

.sidebar-item svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    fill: currentColor;
}

.sidebar-section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.9);
    padding: 20px 18px 8px;
    text-transform: uppercase;
}

/* ===== Page Header ===== */
.page-header {
    background: var(--primary);
    border-radius: 4px;
    padding: 14px 20px;
    margin: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

.page-header-left {
    flex: 1;
    min-width: 0;
}

.page-header-left h4 {
    margin: 0;
    color: var(--white);
    font-size: 16px;
    font-weight: 700;
}

.page-header-left p {
    margin: 2px 0 0 0;
    font-size: 12px;
    color: var(--secondary);
    font-weight: 500;
}

.page-header-subtitle {
    margin: 2px 0 0 0;
    font-size: 12px;
    color: var(--secondary);
    font-weight: 400;
}

.page-header-right {
    display: flex;
    align-items: center;
    justify-content: end;
    gap: 10px;
    flex-shrink: 0;
}

.page-header-button {
    background: transparent;
    border: 2px solid var(--white);
    color: var(--white);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 6px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}

.page-header-button:hover {
    background: var(--white);
    color: var(--primary);
}

/* ===== Notas Card ===== */
.notas-card {
    background: var(--primary);
    border-radius: 6px;
    margin: 0 14px 14px 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.notas-card-header {
    background: var(--bg-dark);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--white);
}

.notas-card-header h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
}

.notas-close-btn {
    background: #c0392b;
    border: none;
    color: var(--white);
    font-size: 16px;
    font-weight: 700;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
}

.notas-close-btn:hover {
    background: #e74c3c;
}

.notas-card-body {
    padding: 20px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.notas-section-title {
    margin: 0;
    color: var(--secondary);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
}

/* ===== Notas List ===== */
.notas-lista {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.nota-item {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(168, 212, 230, 0.25);
    border-radius: 6px;
    padding: 14px 18px;
    color: var(--white);
    line-height: 1.5;
}

.nota-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
}

.nota-header .nota-meta {
    color: var(--secondary);
    font-weight: 600;
}

.nota-texto {
    font-size: 13px;
    color: var(--white);
    line-height: 1.55;
    font-weight: 500;
}

.nota-empty {
    text-align: center;
    padding: 28px 16px;
    color: rgba(255, 255, 255, 0.6);
    font-style: italic;
}

</style>
</head>

<script src="https://cdn.tailwindcss.com"></script>
<script>
	tailwind.config = {
		theme: {
			extend: {
				colors: {
					primary: "#2a6f97",
					secondary: "#a8d4e6",
					"bg-dark": "#1a3f5e",
					text: "#e8f4f8",
				},
				fontFamily: {
					sans: ['"Inter"', "sans-serif"],
					mono: ['"IBM Plex Mono"', "monospace"],
				},
			},
		},
	};
</script>

<body>

				</ul>
			</nav>
		</aside>

		<!-- Main Content -->
		<main class="main-content">
			<!-- Page Header -->
			<div class="page-header">
				<div class="page-header-left">
					<h4 id="page-title">Notas clínicas - <span id="utente-nome"></span></h4>
					<p id="page-subtitle" class="page-header-subtitle">
						Proc. <span id="utente-processo"></span> · Cama <span id="utente-cama"></span> ·
						<span id="utente-diagnostico"></span> · <span id="utente-dias"></span> dia(s) internado
					</p>
				</div>
				<div class="page-header-right">
					<button class="page-header-button" onclick="irParaKardex()">Kardex</button>

			<!-- Notas Card -->
			<div class="notas-card">

</html>
