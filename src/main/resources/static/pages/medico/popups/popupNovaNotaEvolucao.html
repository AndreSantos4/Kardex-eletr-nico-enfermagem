<div class="popup-nova-nota-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000] font-sans" id="popup-nova-nota" style="display: none;">
	<div class="popup-nova-nota-box bg-primary rounded-[10px] w-full max-w-[640px] shadow-[0_8px_32px_rgba(0,0,0,0.4)] overflow-hidden">
		<div class="popup-nova-nota-header bg-bg-dark px-[22px] py-4 flex items-center justify-between text-[17px] font-bold text-white">
			<span>Nova Nota de Evolução Clínica</span>
			<button class="popup-nova-nota-close bg-[#c0392b] border-0 text-white text-[15px] font-bold w-8 h-8 rounded-full cursor-pointer flex items-center justify-center hover:bg-[#e74c3c] transition-colors leading-none" onclick="fecharPopupNovaNota()">&#10005;</button>
		</div>
		<div class="popup-nova-nota-content px-6 pt-[22px] pb-6 flex flex-col gap-[18px]">
			<form id="form-nova-nota" onsubmit="submeterNovaNota(event)" class="flex flex-col gap-[18px] [&_.popup-field-nova-nota]:flex [&_.popup-field-nova-nota]:flex-col [&_.popup-field-nova-nota]:gap-2 [&_.popup-label]:text-xs [&_.popup-label]:font-extrabold [&_.popup-label]:tracking-[0.07em] [&_.popup-label]:text-white [&_.popup-label]:uppercase [&_.popup-input]:bg-white [&_.popup-input]:border-[1.5px] [&_.popup-input]:border-secondary/40 [&_.popup-input]:rounded-md [&_.popup-input]:text-bg-dark [&_.popup-input]:text-sm [&_.popup-input]:font-semibold [&_.popup-input]:px-3.5 [&_.popup-input]:py-[11px] [&_.popup-input]:w-full [&_.popup-input]:cursor-pointer [&_.popup-input:focus]:outline-none [&_.popup-input:focus]:border-secondary [&_.popup-select]:bg-white [&_.popup-select]:border-[1.5px] [&_.popup-select]:border-secondary/40 [&_.popup-select]:rounded-md [&_.popup-select]:text-bg-dark [&_.popup-select]:text-sm [&_.popup-select]:font-semibold [&_.popup-select]:px-3.5 [&_.popup-select]:py-[11px] [&_.popup-select]:w-full [&_.popup-select]:cursor-pointer [&_.popup-select:focus]:outline-none [&_.popup-select:focus]:border-secondary [&_.popup-textarea]:bg-white [&_.popup-textarea]:border-[1.5px] [&_.popup-textarea]:border-secondary/40 [&_.popup-textarea]:rounded-md [&_.popup-textarea]:text-bg-dark [&_.popup-textarea]:text-sm [&_.popup-textarea]:px-3.5 [&_.popup-textarea]:py-3 [&_.popup-textarea]:w-full [&_.popup-textarea]:min-h-[130px] [&_.popup-textarea]:resize-y [&_.popup-textarea]:leading-[1.5] [&_.popup-textarea:focus]:outline-none [&_.popup-textarea:focus]:border-secondary">
				<div class="popup-field-nova-nota">
					<label class="popup-label">JUSTIFICAÇÃO CLÍNICA *</label>
					<textarea id="justificacao-clinica" class="popup-textarea" placeholder="Registe a avaliação clínica, evolução do quadro, decisões terapêuticas..." rows="5" required></textarea>
				</div>

				<div class="popup-row-2cols grid grid-cols-2 gap-[14px]">
					<div class="popup-field-nova-nota">
						<label class="popup-label">DATA/HORA *</label>
						<input type="datetime-local" id="data-hora-nota" class="popup-input" required />
					</div>
					<div class="popup-field-nova-nota">
						<label class="popup-label">TIPO DE NOTA</label>
						<select id="tipo-nota" class="popup-select">
							<option value="S" selected>Subjetivo</option>
							<option value="O">Objetivo</option>
							<option value="A">Avaliação</option>
							<option value="P">Plano</option>
						</select>
					</div>
				</div>

				<div class="popup-info-note bg-transparent border-[1.5px] border-white rounded-md px-4 py-2.5 text-white text-[12.5px] font-medium text-center leading-[1.4]">
					<span>A nota de evolução é imutável após publicação. Verifique o conteúdo antes de confirmar.</span>
				</div>

				<div class="popup-actions-nova-nota flex gap-3 mt-1">
					<button type="button" class="btn-cancelar-nova-nota flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-3 rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors" onclick="fecharPopupNovaNota()">CANCELAR</button>
					<button type="submit" class="btn-confirmar-nova-nota flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.05em] py-3 rounded-lg cursor-pointer hover:bg-white hover:text-primary transition-colors">Publicar Nota</button>
				</div>
			</form>
		</div>
	</div>
</div>
