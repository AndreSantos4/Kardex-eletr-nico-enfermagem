<div class="pop-up-registar fixed inset-0 z-[1000] flex items-center justify-center bg-black/55 font-sans" id="popup-prescrever-exame" style="display:none">
    <div class="pop-up bg-[#1a5f7a] rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.45)] w-[560px] max-w-[95vw] overflow-hidden">

            <div class="title"><h3 class="text-text text-[1.05rem] font-semibold m-0">Prescrever Exame Complementar</h3></div>
            <div class="icon">

                <div class="select-1 flex-1">
                    <label for="popup-tipo-exame">TIPO DE EXAME *</label>
                    <select id="popup-tipo-exame">
                        <option value="HEMOGRAMA_COMPLETO">Hemograma Completo</option>
                        <option value="PAINEL_METABOLICO">Painel metabólico</option>
                        <option value="FUNCAO_HEPATICA">Função hepática</option>
                        <option value="FUNCAO_TIROIDE">Função tiroide</option>
                        <option value="NIVEIS_VITAMINAS">Níveis de vitaminas</option>
                    </select>
                </div>
                <div class="select-2 flex-1">
                    <label for="popup-urgencia">URGÊNCIA *</label>
                    <select id="popup-urgencia">
                        <option value="BAIXA">Baixa</option>
                        <option value="MODERADA">Moderada</option>
                        <option value="NORMAL">Normal</option>
                        <option value="ALTA">Alta</option>
                    </select>
                </div>
            </div>
            <div class="form-row flex gap-3">
                <div class="form-group flex-1">
                    <label for="popup-data-pretendida">DATA PRETENDIDA *</label>
                    <input type="date" id="popup-data-pretendida" required />
                    <label for="popup-indicacao">Indicação Clínica *</label>
                    <textarea id="popup-indicacao" placeholder="Motivo da requisição do exame" required></textarea>
                    <label for="popup-observacoes">Observações para o laboratório</label>
                    <textarea id="popup-observacoes" placeholder="Instruções especiais..."></textarea>
