<div class="popup-overlay fixed inset-0 bg-black/55 flex items-center justify-center z-[1000]" id="popup-suspender" style="display: none;">

			<button class="popup-close-suspender bg-[#c0392b] border-0 text-white text-sm font-bold w-7 h-7 rounded-full cursor-pointer flex items-center justify-center hover:bg-[#e74c3c] transition-colors" onclick="fecharPopupSuspender()">&#10005;</button>

		<div class="popup-content-suspender px-6 pt-[22px] pb-6 flex flex-col gap-[18px]">

			</div>

					<div class="popup-field-suspender">
						<label class="popup-label">TIPO DE SUSPENSÃO *</label>
						<select id="tipo-suspensao" class="popup-select" onchange="toggleDataRetoma(this.value)">
							<option value="TEMPORARIA">Temporária (definir data retoma)</option>
							<option value="DEFINITIVA">Definitiva</option>
						</select>
					</div>
					<div class="popup-field-suspender" id="campo-data-retoma">
						<label class="popup-label">DATA RETOMA (SE TEMPORÁRIA) *</label>
						<input type="date" id="data-retoma" class="popup-input" />
					</div>
				</div>
				<div class="popup-field-suspender">
					<label class="popup-label">MOTIVO CLÍNICO *</label>
					<select id="motivo-clinico" class="popup-select">
						<option value="RECUSA_SISTEMATICA">Recusa sistemática do utente</option>
						<option value="EFEITOS_ADVERSOS">Efeitos adversos</option>
						<option value="INTERACAO_MEDICAMENTOSA">Interação medicamentosa</option>
						<option value="REMISSAO_CLINICA">Remissão clínica</option>
						<option value="OUTRO">Outro</option>
					</select>
				</div>
				<div class="popup-field-suspender">

					<div class="info-icon w-8 h-8 rounded-full bg-bg-dark text-white font-bold text-lg italic flex items-center justify-center shrink-0" style="font-family:serif;">i</div>
					<span>Suspensão registada como imutável. Enfermeiro notificado. Stock reservado libertado.</span>
				</div>
				<div class="popup-actions-suspender flex gap-2.5 justify-stretch">

					<button type="submit" class="btn-confirmar-suspender flex-1 bg-transparent border-2 border-white text-white text-[13px] font-bold py-[11px] rounded-md cursor-pointer hover:bg-white hover:text-primary transition-colors">Suspender prescrição</button>
				</div>
			</form>
		</div>
	</div>
</div>
