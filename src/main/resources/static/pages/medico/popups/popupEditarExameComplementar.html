<div class="pop-up-registar" id="popup-editar-exame" style="display:none">
    <div class="pop-up">
        <div class="pop-up-header">
            <div class="title">
                <h3>Editar Exame Complementar</h3>
            </div>
            <div class="icon">
                <a href="" class="cross" onclick="fecharPopupEditar(); return false;">
                    <svg xmlns="http://www.w3.org/2000/svg" height="15" width="15" viewBox="0 0 384 512">
                        <path fill="rgb(220, 49, 26)"
                            d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
                    </svg>
                </a>
            </div>
        </div>
        <div class="pop-up-main">
            <div class="form-choice">
                <div class="select-1">
                    <label for="edit-data-pretendida">DATA PRETENDIDA *</label>
                    <input type="date" id="edit-data-pretendida" required />
                </div>
                <div class="select-2">
                    <label for="edit-urgencia">URGÊNCIA *</label>
                    <select id="edit-urgencia">
                        <option value="BAIXA">Baixa</option>
                        <option value="MODERADA">Moderada</option>
                        <option value="NORMAL">Normal</option>
                        <option value="ALTA">Alta</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="edit-indicacao">Indicação Clínica *</label>
                    <textarea id="edit-indicacao" placeholder="Motivo da requisição do exame" required></textarea>
                </div>
            </div>
            <div class="buttons-bottom">
                <input type="button" value="Cancelar" class="btn-cancelar" onclick="fecharPopupEditar()" />
                <input type="button" value="Guardar Alterações" onclick="submeterEdicao()" />
            </div>
        </div>
    </div>
</div>
