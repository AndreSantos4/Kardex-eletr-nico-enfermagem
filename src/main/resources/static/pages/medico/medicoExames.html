<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Medico Exames</title>
<style>
/* === ../../styles/medico/medicoPrescreverMedicamento.css === */
:root {
    --primary: #2a6f97;
    --secondary: #a8d4e6;
    --white: #ffffff;
    --text: #e8f4f8;
    --border: rgba(255, 255, 255, 0.12);
    --sans: "IBM Plex Sans", sans-serif;
    --bg-dark: #1a3f5e;
    --input-bg: #1e4d6b;
    --alertas: hsl(0, 98%, 36%);
}

body {
    font-family: var(--sans);
    color: var(--text);
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--white);
}

.main-container {
    display: flex;
    flex-grow: 1;
    align-items: stretch;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.topbar {
    height: 52px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
}

.topbar-page {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.06em;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.topbar-user {
    background: red;
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.06em;
}

.btn-sair {
    background: transparent;
    border: 2px solid var(--white);
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.01em;
    padding: 5px 18px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
}

.btn-sair:hover {
    background: var(--white);
    color: var(--primary);
}

.sidebar {
    width: 210px;
    background: var(--primary);
    padding: 12px 0;
    flex-shrink: 0;
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.sidebar-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    transition: background 0.2s;
}

.sidebar-item a:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--white);
}

.sidebar-item.active a {
    background: var(--white);
    color: var(--primary);
}

.sidebar-item svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    fill: currentColor;
}

.sidebar-section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.9);
    padding: 20px 18px 8px;
    text-transform: uppercase;
}

.paciente-header {
    background: var(--primary);
    margin: 14px 14px 0 14px;
    border-radius: 4px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.paciente-header-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.paciente-nome {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
}

.paciente-detalhes {
    font-size: 12px;
    color: var(--secondary);
}

.paciente-header-actions {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
}

.btn-header {
    background: transparent;
    border: 2px solid var(--white);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 16px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
}

.btn-header:hover {
    background: var(--white);
    color: var(--primary);
}

.content-area {
    display: flex;
    gap: 14px;
    margin: 14px;
    align-items: flex-start;
    flex: 1;
}

.form-card {
    flex: 1;
    background: var(--primary);
    border-color: var(--primary);
    border-width: 3px;
    border-radius: 8px;
    min-width: 0;
    border-style: solid;
}

.form-card-header {
    padding: 12px 18px;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
}

.form-card-body {
    background: var(--white);
    color: var(--primary);
    border-radius: 8px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.form-group-full {
    grid-column: 1 / -1;
}

.form-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.form-select {
    background: var(--primary);
    border: none;
    border-radius: 4px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    cursor: pointer;
    appearance: auto;
    width: 100%;
    box-sizing: border-box;
}

.form-select:focus {
    outline: 2px solid var(--secondary);
}

.form-select:disabled {
    background: #8b9db0;
    color: #ccc;
    cursor: not-allowed;
}

.form-select option {
    background: var(--bg-dark);
}

input.form-select[type="text"]::placeholder,
input.form-select[type="number"]::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

input.form-select[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

input.form-select[type="number"]::-webkit-inner-spin-button,
input.form-select[type="number"]::-webkit-outer-spin-button {
    filter: invert(1);
    opacity: 0.6;
}

.intervalo-toma-group {
    display: flex;
    gap: 8px;
}

.intervalo-toma-group .intervalo-valor {
    width: 100px;
    flex-shrink: 0;
    text-align: center;
}

.intervalo-toma-group .intervalo-unidade {
    flex: 1;
}

.form-checkboxes {
    display: flex;
    gap: 24px;
    align-items: center;
}

.form-checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--primary);
    cursor: pointer;
}

.form-checkbox-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--primary);
}

.verificacao-box {
    background: var(--primary);
    border-radius: 4px;
    padding: 12px 14px;
}

.verificacao-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
}

.verificacao-body {
    font-size: 12px;
    color: var(--secondary);
    line-height: 1.5;
}

.verificacao-body .warn-interacao {
    color: #f0c060;
}

.verificacao-body .warn-dose {
    color: var(--secondary);
    margin-bottom: 4px;
}

.verificacao-body .warn-alergia {
    color: var(--alertas);
    font-weight: 700;
    margin-bottom: 4px;
}

.verificacao-body .ok-alergia {
    color: #80e080;
    margin-bottom: 4px;
}

.form-actions {
    display: flex;
    justify-content: flex-end;
}

.btn-confirmar {
    background: transparent;
    border: 2px solid var(--primary);
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 8px 24px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
}

.btn-confirmar:hover {
    background: var(--primary);
    color: var(--white);
}

.right-panels {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.panel {
    background: var(--primary);
    border-radius: 6px;
    overflow: hidden;
}

.panel-header {
    background: var(--primary);
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
}

.panel-body {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--white);
    border: 2px solid var(--primary);
    color: var(--primary);
    border-radius: 0px 0px 6px 6px;
}

.med-badge {
    background: var(--bg-dark);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.med-badge-nome {
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap;
}

.med-badge-info {
    font-size: 11px;
    color: var(--secondary);
    text-align: right;
    white-space: nowrap;
}

.alergia-item {
    font-size: 13px;
    color: var(--secondary);
    padding: 2px 0;
}

/* === ../../styles/medico/popups/popupPrescreverExameComplementar.css === */
:root {
    --popup-bg: #1a5f7a;
    --header-bg: #154e66;
    --input-bg: #ffffff;
    --label-color: #e0f0f8;
    --placeholder-color: #9bb8c5;
    --text-color: #1a3a4a;
    --btn-bg: #2a7fa0;
    --btn-hover: #236d8c;
    --radius: 6px;
}

.pop-up-registar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    background: rgba(0, 0, 0, 0.4);
}

.pop-up {
    background: var(--popup-bg);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    width: 700px;
    max-width: 95vw;
    overflow: hidden;
}

.pop-up-header {
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.pop-up-header h3 {
    color: var(--input-bg);
    font-size: 1.05rem;
    font-weight: 600;
}

.pop-up-header a.cross {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 50%;
    width: 28px;
    height: 28px;
}

.pop-up-header a.cross:hover {
    background: hsl(0, 0%, 73%);
}

.pop-up-header a.cross svg {
    width: 13px;
    height: 13px;
}

.pop-up-main {
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.pop-up label {
    display: block;
    color: var(--label-color);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
}

.pop-up input,
.pop-up select {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid rgba(255, 255, 255, 0.35);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 0.87rem;
    color: var(--placeholder-color);
    outline: none;
    appearance: none;
    transition:
        border-color 0.2s,
        box-shadow 0.2s;
    margin-bottom: 6px;
}

.pop-up-desativar input {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid rgba(255, 255, 255, 0.35);
    border-radius: var(--radius);
    padding: 20px 10px;
    font-size: 0.87rem;
    color: var(--placeholder-color);
    outline: none;
    appearance: none;
    transition:
        border-color 0.2s,
        box-shadow 0.2s;
    margin-bottom: 6px;
}

.pop-up input::placeholder {
    color: var(--placeholder-color);
}

.pop-up input:focus,
.pop-up select:focus {
    border-color: rgba(255, 255, 255, 0.85);
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
}

.pop-up option {
    color: var(--text-color);
}

.form-row {
    display: flex;
    gap: 12px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.pop-up-footer {
    background: var(--header-bg);
    padding: 12px 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.buttons-bottom {
    display: flex;
    padding: 2% 0%;
    gap: 10px;
}

.buttons-bottom button {
    flex: 1;
    padding: 10px;
    background: var(--btn-bg);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    cursor: pointer;
    transition:
        background 0.2s,
        transform 0.1s;
}

.buttons-bottom button:hover {
    background: var(--btn-hover);
}

.buttons-bottom button:active {
    transform: scale(0.97);
}

.buttons-bottom input {
    flex: 1;
    padding: 10px;
    background: var(--btn-bg);
    color: #fff;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    cursor: pointer;
    transition:
        background 0.2s,
        transform 0.1s;
}

.buttons-bottom input:hover {
    background: var(--btn-hover);
}

.buttons-bottom input:active {
    transform: scale(0.97);
}

.pop-up textarea::placeholder {
    color: var(--placeholder-color);
}

.pop-up textarea:focus {
    border-color: rgba(255, 255, 255, 0.85);
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
}

.buttons-bottom input:hover {
    background: var(--btn-hover);
}

.buttons-bottom input:active {
    transform: scale(0.97);
}

.pop-up-desativar p {
    color: var(--text);
    font-size: small;
    padding-bottom: 10px;
}

#notas {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: vertical;
    box-sizing: border-box;
    font-family: inherit;
}

.info-box {
    color: var(--label-color);
    border-radius: 50px;
    border-style: solid;
    font-size: small;
    padding-left: 40px;
}

.info-box svg {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    fill: currentColor;
}

.form-choice{
    display: flex;
    gap: 20px;
}

.form-choice .select-1{
    width: 50%;
    }

.form-choice .select-2{
    width: 50%;
}

.form-choice{
    padding-bottom: 10px;
}
</style>
</head>
