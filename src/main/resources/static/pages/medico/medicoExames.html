<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medico Exames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: "#2a6f97", secondary: "#a8d4e6", "bg-dark": "#1a3f5e", text: "#e8f4f8", "input-bg": "#1e4d6b", ok: "#2e9e6e", alertas: "hsl(0, 98%, 36%)" },
                fontFamily: { sans: ['"Inter"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"] },
            }},
        };
    </script>
</head>

<body class="font-sans text-text m-0 flex flex-col min-h-screen bg-white">
    <div class="h-[52px] bg-primary flex items-center justify-between px-6 border-b border-white/10">
        <span class="text-[13px] text-text tracking-wider">Medico Exames</span>
        <div class="flex items-center gap-4">
            <span class="bg-red-600 text-text text-[13px] font-bold px-2 py-0.5 rounded-sm tracking-wider"><span id="nome-medico"></span></span>
            <button class="bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-[0.01em] px-[18px] py-[5px] cursor-pointer rounded-[10px] hover:bg-white hover:text-primary transition-colors" onclick="logout()">SAIR</button>
        </div>
    </div>

    <div class="flex flex-grow items-stretch">
        <aside class="w-[210px] bg-primary py-3 shrink-0 [&_ul]:list-none [&_ul]:p-0 [&_ul]:m-0 [&_.sidebar-item_a]:flex [&_.sidebar-item_a]:items-center [&_.sidebar-item_a]:gap-3 [&_.sidebar-item_a]:px-[18px] [&_.sidebar-item_a]:py-3 [&_.sidebar-item_a]:no-underline [&_.sidebar-item_a]:text-text [&_.sidebar-item_a]:text-sm [&_.sidebar-item_a]:transition-colors [&_.sidebar-item_a:hover]:bg-white/15 [&_.sidebar-item_a:hover]:text-white [&_.sidebar-item.active_a]:bg-white [&_.sidebar-item.active_a]:text-primary [&_.sidebar-item_svg]:w-[18px] [&_.sidebar-item_svg]:h-[18px] [&_.sidebar-item_svg]:shrink-0 [&_.sidebar-item_svg]:fill-current">
            <nav>
                <div class="text-[11px] font-extrabold tracking-[0.1em] text-white/90 px-[18px] pt-5 pb-2 uppercase">Principal</div>
                <ul>
                    <li class="sidebar-item"><a href="medicoDashboard"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1z"/></svg>Home</a></li>
                    <li class="sidebar-item"><a href="medicoListaUtentes"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32z"/></svg>Lista de Utentes</a></li>
                    <li class="sidebar-item"><a href="medicoPrescreverMedicamento"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M471.6 21.7c-21.9-21.9-57.3-21.9-79.2 0L368 46.1 465.9 144 490.3 119.6c21.9-21.9 21.9-57.3 0-79.2L471.6 21.7z"/></svg>Prescrever</a></li>
                </ul>

                <div class="text-[11px] font-extrabold tracking-[0.1em] text-white/90 px-[18px] pt-5 pb-2 uppercase">Clínico</div>
                <ul>
                    <li class="sidebar-item active"><a href="medicoExames"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M184.6 411.5c-3.1 7.3-5.4 14.9-6.8 22.6-14.5 8.8-31.5 13.9-49.8 13.9-53 0-96-43-96-96L32 64C14.3 64 0 49.7 0 32S14.3 0 32 0L224 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l0 255.6-39.4 91.9z"/></svg>Exames</a></li>
                    <li class="sidebar-item"><a href="#"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M311.4 32l8.6 0c35.3 0 64 28.7 64 64l0 352c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 96C0 60.7 28.7 32 64 32l8.6 0C83.6 12.9 104.3 0 128 0L256 0c23.7 0 44.4 12.9 55.4 32z"/></svg>Notas de evolução</a></li>
                </ul>

                <div class="text-[11px] font-extrabold tracking-[0.1em] text-white/90 px-[18px] pt-5 pb-2 uppercase">Cuidados</div>
                <ul>
                    <li class="sidebar-item"><a href="#"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M320 32l-8.6 0C300.4 12.9 279.7 0 256 0L128 0C104.3 0 83.6 12.9 72.6 32L64 32C28.7 32 0 60.7 0 96L0 448c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-352c0-35.3-28.7-64-64-64z"/></svg>Planos de Cuidados</a></li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <div class="bg-primary mx-[14px] mt-[14px] rounded px-4 py-2.5 flex items-center justify-between gap-3">
                <div class="flex flex-col gap-0.5">
                    <span class="text-sm font-bold text-white">Exames - <span id="nome-utente"></span></span>
                    <span class="text-xs text-secondary">
                        Proc. <span id="processo"></span> &middot; Cama
                        <span id="cama"></span> &middot;
                        <span id="diagnostico"></span> &middot;
                        <span id="dias-internado"></span> dia(s) internado
                    </span>
                </div>
                <div class="flex gap-2.5 shrink-0">
                    <button class="bg-transparent border-2 border-white text-white text-xs font-bold px-4 py-1 cursor-pointer rounded-[10px] hover:bg-white hover:text-primary transition-colors" onclick="abrirPopup()">+ PRESCREVER EXAME</button>
                </div>
            </div>

            <div class="flex gap-[14px] m-[14px] items-start flex-1">
                <div class="w-full overflow-x-auto rounded-md border border-primary text-primary">
                    <table class="w-full border-collapse font-sans text-sm">
                        <thead class="[&_tr]:bg-primary [&_tr]:text-white [&_tr]:text-center [&_tr]:border-b [&_tr]:border-white [&_th]:px-4 [&_th]:py-3 [&_th]:font-semibold [&_th]:text-[0.8rem] [&_th]:normal-case [&_th]:whitespace-nowrap">
                            <tr>
                                <th>Tipo</th>
                                <th>Urgência</th>
                                <th>Data Pedido</th>
                                <th>Data Pretendida</th>
                                <th>Indicação Clínica</th>
                                <th>Observações</th>
                                <th>Estado</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="exames-tbody" class="[&_tr]:bg-white [&_tr]:text-primary [&_tr]:border-b [&_tr]:border-[#2a5a8c] [&_tr]:transition-colors [&_tr:hover]:bg-text [&_td]:px-4 [&_td]:py-3.5 [&_td]:align-middle [&_td]:text-center [&_button]:min-w-[32px] [&_button]:h-8 [&_button]:px-2.5 [&_button]:mx-0.5 [&_button]:bg-transparent [&_button]:border-[1.5px] [&_button]:border-primary [&_button]:rounded [&_button]:text-primary [&_button]:text-xs [&_button]:font-bold [&_button]:tracking-wider [&_button]:cursor-pointer [&_button]:transition-colors [&_button:hover]:bg-secondary"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../../scripts/logout.js"></script>
    <div id="notificacoes-container"></div>
    <script src="../../scripts/notificacao.js"></script>
    <script src="../../scripts/medico/medicoExames.js"></script>
</body>

</html>
