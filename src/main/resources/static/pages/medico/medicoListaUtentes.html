<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../styles/medico/medicoListaUtentes.css">
    <link rel="stylesheet" href="../../styles/popups/notificacao.css" />
    <title>Lista de Utentes</title>
</head>

<body>
    <div class="content">
        <!--Top Bar-->
        <div class="topbar">
            <span class="topbar-page">Lista de Utentes</span>
            <div class="topbar-right">
                <span class="topbar-user"> <span id="nome-medico"></span> | Turno: <span id="turno"></span></span>
                <button class="btn-sair" onclick="logout()">SAIR</button>
            </div>
        </div>

        <!--Side Bar-->
        <div class="main-container">

            <aside class="sidebar">
                <nav>
                    <div class="sidebar-section-label">Principal</div>
                    <ul>
                        <li class="sidebar-item">
                            <a href="medicoDashboard">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path
                                        d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1zm16 50.1L96 199.7 96 448c0 8.8 7.2 16 16 16l48 0 0-104c0-39.8 32.2-72 72-72l48 0c39.8 0 72 32.2 72 72l0 104 48 0c8.8 0 16-7.2 16-16l0-248.3-160-143.4zM208 464l96 0 0-104c0-13.3-10.7-24-24-24l-48 0c-13.3 0-24 10.7-24 24l0 104z" />
                                </svg>
                                Home
                            </a>
                        </li>
                        <li class="sidebar-item active">
                            <a href="medicoListaUtentes">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
                                    <path
                                        d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32zm521.3 64c4.3-9.8 6.7-20.6 6.7-32l0-16c0-53.2-20-101.8-52.9-138.6 11.7-3.5 24.1-5.4 36.9-5.4 70.7 0 128 57.3 128 128l0 32c0 17.7-14.3 32-32 32l-86.7 0zM472 160a72 72 0 1 1 144 0 72 72 0 1 1 -144 0zM160 432c0-88.4 71.6-160 160-160s160 71.6 160 160l0 16c0 17.7-14.3 32-32 32l-256 0c-17.7 0-32-14.3-32-32l0-16z" />
                                </svg>
                                Lista de Utentes
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <main class="main-content">
                <!--Page Header-->
                <div class="page-header">
                    <div class="page-header-left">
                        <h4>Lista de Utentes - Serviço Internamento</h4>
                        <div class="page-header-data">
                            <p id="data">07/03/2026</p>
                            <p>&nbsp-&nbsp</p>
                            <p id="hora">16:42</p>
                            <p>&nbsp- Turno da&nbsp</p>
                            <p id="turno">Tarde</p>
                        </div>

                    </div>
                    <div class="page-header-right">
                        <div class="search-bar">
                            <div class="search-input-wrap">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path
                                        d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
                                </svg>
                                <input type="text" placeholder="Nome, Processo ou SNS" />
                            </div>
                        </div>

                        <select name="estados" id="estados">
                            <option value="todos">Todos</option>
                            <option value="internado">Internado</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>

                <!--Lista Utentes Bar-->
                <div class="lista-utentes-bar">
                    <div class="lista-utentes-table">
                        <table class="lista-utentes">
                            <thead>
                                <tr>
                                    <th>Nº Processo</th>
                                    <th>Nome</th>
                                    <th>Cama</th>
                                    <th>Diagnóstico</th>
                                    <th>Médico</th>
                                    <th>Admissão</th>
                                    <th>Estado</th>
                                    <th>Alertas</th>
                                    <th>Ação</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <div class="pop-up-container" style="display: none" id="popUpContainer"></div>
        </div>
    </div>
    <script src="../../scripts/logout.js"></script>
    <script src="../../scripts/medico/medicoListaUtentes.js"></script>
    <div id="notificacoes-container"></div>
    <script src="../../scripts/notificacao.js"></script>
</body>

</html>
