<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../../styles/popups/notificacao.css" />
    <title>Lista de Utentes</title>
<style>
/* === ../../styles/medico/medicoListaUtentes.css === */
:root {
  --primary: #2a6f97;
  --secondary: #a8d4e6;
  --white: #ffffff;
  --text: #e8f4f8;
  --border: rgba(255, 255, 255, 0.12);
  --sans: "IBM Plex Sans", sans-serif;
  --alertas: hsl(0, 98%, 36%);
}

/* Body */
body {
  font-family: var(--sans);
  color: var(--text);
  margin: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.main-container {
  display: flex;
  flex-grow: 1;
  align-items: stretch;
}

.main-content {
  flex: 1;
}

.content,
.content-container {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 100vh;
}

/*Top Bar*/
.topbar {
  height: 52px;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
}

.topbar-page {
  font-size: 13px;
  color: var(--text);
  letter-spacing: 0.06em;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.topbar-user {
  background: green;
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.06em;
}

.btn-sair {
  background: transparent;
  border: 2px solid var(--white);
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.01em;
  padding: 5px 18px;
  cursor: pointer;
  border-radius: 10px;
  transition:
    background 0.15s,
    color 0.15s;
}

.btn-sair:hover {
  background: var(--white);
  color: var(--primary);
}

/*Side Bar*/
.sidebar {
  width: 210px;
  background: var(--primary);
  padding: 12px 0;
  border-top: 1px solid var(--white);
}

.sidebar ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.sidebar-item a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  transition: background 0.2s;
}

.sidebar-item.active a,
.sidebar-item a:hover {
  background: rgba(255, 255, 255, 0.15);
  color: var(--white);
  border-right: 1px solid var(--primary);
}

.sidebar-item.active a {
  background: var(--white);
  color: var(--primary);
}

.sidebar-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  fill: currentColor;
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.9);
  padding: 20px 18px 8px;
  text-transform: uppercase;
}

/*Page Header*/
.page-header {
  background: var(--primary);
  border-radius: 4px;
  padding: 14px 20px;
  margin: 14px;
  display: flex;
  align-items: center;
}

.page-header h4 {
  margin: 0;
}

.page-header-left {
  width: 50%;
}

.page-header-data {
  display: flex;
  align-items: center;
}

.page-header-left p {
  margin: 0;
}

.page-header-right {
  width: 50%;
  display: flex;
  align-items: center;
  justify-content: end;
  gap: 30px;
}

/*Page Header - Search Bar*/
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-input-wrap {
  display: flex;
  align-items: center;
  background: var(--white);
  border: 1px solid black;
  border-radius: 4px;
  padding: 5px 10px;
  gap: 6px;
}

.search-input-wrap input {
  background: transparent;
  border: none;
  outline: none;
  color: black;
  font-family: var(--sans);
  font-size: 13px;
  width: 180px;
}

.search-input-wrap input::placeholder {
  color: var(--primary);
}

.search-input-wrap svg {
  fill: black;
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/*Page Header - DropDown*/
#estados {
  background: var(--white);
  border: 2px solid var(--white);
  color: var(--primary);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.01em;
  padding: 5px 18px;
  cursor: pointer;
  border-radius: 10px;
  transition:
    background 0.15s,
    color 0.15s;
}

#estados:hover {
  background: var(--secondary);
}

#estados option {
  background: var(--white);
  color: var(--primary);
  font-weight: 400;
}

/*Lista de Utentes*/
.lista-utentes-bar {
  margin: 14px;
  border-radius: 5px;
  border: 1px solid var(--primary);
}

.lista-utentes-table {
  width: 100%;
  overflow-x: auto;
}

.lista-utentes {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--sans);
  font-size: 0.875rem;
  table-layout: fixed;
}

.lista-utentes th:nth-child(1),
.lista-utentes td:nth-child(1) {
  width: 9%;
}

.lista-utentes th:nth-child(2),
.lista-utentes td:nth-child(2) {
  width: 13%;
}

.lista-utentes th:nth-child(3),
.lista-utentes td:nth-child(3) {
  width: 7%;
}

.lista-utentes th:nth-child(4),
.lista-utentes td:nth-child(4) {
  width: 22%;
}

.lista-utentes th:nth-child(5),
.lista-utentes td:nth-child(5) {
  width: 22%;
}

.lista-utentes th:nth-child(6),
.lista-utentes td:nth-child(6) {
  width: 7%;
}

.lista-utentes th:nth-child(7),
.lista-utentes td:nth-child(7) {
  width: 7%;
}

.lista-utentes th:nth-child(8),
.lista-utentes td:nth-child(8) {
  width: 7%;
}

.lista-utentes th:nth-child(9),
.lista-utentes td:nth-child(9) {
  width: 10%;
}

.lista-utentes thead tr {
  background-color: var(--primary);
  color: var(--white);
  text-align: center;
  border-bottom: 1px solid var(--white);
}

.lista-utentes thead th {
  padding: 12px 16px;
  font-weight: 600;
  font-size: 0.8rem;
  text-transform: none;
  white-space: nowrap;
}

.lista-utentes tbody tr {
  background-color: var(--white);
  color: var(--primary);
  border-bottom: 1px solid #2a5a8c;
  transition: background-color 0.15s ease;
}

.lista-utentes tbody tr:hover {
  background-color: var(--text);
}

.lista-utentes tbody td {
  padding: 14px 16px;
  vertical-align: middle;
  text-align: center;
}

.ver-mais {
  background: var(--primary);
  border: 2px solid var(--white);
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.01em;
  padding: 5px 18px;
  cursor: pointer;
  border-radius: 10px;
  transition:
    background 0.15s,
    color 0.15s;
}

.ver-mais:hover {
  background: var(--white);
  color: var(--primary);
  border: 2px solid var(--primary);
}

/* Paginação */
.paginacao {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 12px 8px 8px;
}

.paginacao-tamanho {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
}

.paginacao-tamanho select {
  background: var(--white);
  border: 1.5px solid var(--primary);
  color: var(--primary);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
}

.paginacao-tamanho select:hover {
  background: var(--secondary);
}

.paginacao-paginas {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
}

.btn-pagina {
  min-width: 32px;
  height: 32px;
  padding: 0 10px;
  background: transparent;
  border: 1.5px solid var(--primary);
  border-radius: 4px;
  color: var(--primary);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition:
    background 0.15s,
    color 0.15s,
    border-color 0.15s;
}

.btn-pagina:hover {
  background: var(--secondary);
}

.btn-pagina.ativo {
  background: var(--primary);
  border-color: var(--primary);
  color: var(--white);
}

</style>
</head>

<body>
    <div class="content">
        <!--Top Bar-->
        <div class="topbar">
            <span class="topbar-page">Lista de Utentes</span>
            <div class="topbar-right">
                <span class="topbar-user"> <span id="nome-medico"></span> | Turno: <span id="turno"></span></span>
                <button class="btn-sair" onclick="logout()">SAIR</button>
            </div>
        </div>

        <!--Side Bar-->
        <div class="main-container">

            <aside class="sidebar">
                <nav>
                    <div class="sidebar-section-label">Principal</div>
                    <ul>
                        <li class="sidebar-item">
                            <a href="medicoDashboard">

                                        d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1zm16 50.1L96 199.7 96 448c0 8.8 7.2 16 16 16l48 0 0-104c0-39.8 32.2-72 72-72l48 0c39.8 0 72 32.2 72 72l0 104 48 0c8.8 0 16-7.2 16-16l0-248.3-160-143.4zM208 464l96 0 0-104c0-13.3-10.7-24-24-24l-48 0c-13.3 0-24 10.7-24 24l0 104z" />

                    </ul>
                </nav>

            <main class="main-content">

                <div class="page-header">

            <div class="pop-up-container" style="display: none" id="popUpContainer"></div>
        </div>
    </div>

</html>
