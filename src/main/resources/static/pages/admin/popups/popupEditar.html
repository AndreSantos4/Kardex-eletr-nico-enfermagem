<div class="pop-up-editar" style="display: none">
  <div class="pop-up">
    <div class="pop-up-header">
      <div class="title"><h3>Editar Utilizador</h3></div>
      <div class="icon">
        <a
          href=""
          class="cross"
          onclick="
            fecharPopUp();
            return false;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="15"
            width="15"
            viewBox="0 0 384 512"
          >
            <path
              fill="rgb(220, 49, 26)"
              d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
            />
          </svg>
        </a>
      </div>
    </div>
    <div class="pop-up-main">
      <form method="post" data-user-id="">
        <label for="edit-name">NOME COMPLETO *</label>
        <input
          type="text"
          name="name"
          id="edit-name"
          placeholder="Nome Completo"
        />

        <div class="form-row">
          <div class="form-group">
            <label for="edit-data-nascimento">DATA DE NASCIMENTO *</label>
            <input
              type="date"
              name="data-nascimento"
              id="edit-data-nascimento"
            />
          </div>
          <div class="form-group">
            <label for="edit-sexo">Sexo *</label>
            <select name="sexo" id="edit-sexo">
              <option value="MASCULINO">Masculino</option>
              <option value="FEMININO">Feminino</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-n-identificacao">Nº IDENTIFICAÇÃO *</label>
            <input
              type="text"
              name="n-identificacao"
              id="edit-n-identificacao"
              placeholder="BI/CC"
            />
          </div>
          <div class="form-group">
            <label for="edit-n-sns">Nº SNS *</label>
            <input
              type="text"
              name="n-sns"
              id="edit-n-sns"
              placeholder="Número SNS"
            />
          </div>
        </div>

        <label for="edit-email">EMAIL *</label>
        <input type="email" name="email" id="edit-email" placeholder="Email" />

        <div class="form-row">
          <div class="form-group">
            <label for="edit-contacto">CONTACTO *</label>
            <input
              type="tel"
              name="contacto"
              id="edit-contacto"
              placeholder="Contacto"
            />
          </div>
          <div class="form-group">
            <label for="edit-contacto-emg">CONTACTO EMERGÊNCIA *</label>
            <input
              type="tel"
              name="contacto-emg"
              id="edit-contacto-emg"
              placeholder="Contacto de Emergência"
            />
          </div>
        </div>

        <label for="edit-funcao">FUNÇÃO *</label>
        <select id="edit-funcao" name="funcao">
          <option value="ADMIN">Administrador</option>
          <option value="MEDICO">Médico</option>
          <option value="ENFERMEIRO_CHEFE">Enfermeiro-Chefe</option>
          <option value="ENFERMEIRO">Enfermeiro</option>
        </select>
      </form>
    </div>
    <div class="pop-up-footer">
      <div class="warning-box">
        <label>Alterações ficam registadas no log de autoria</label>
      </div>
      <div class="buttons">
        <button class="btn-cancelar" onclick="fecharPopUp()">Cancelar</button>
        <button onclick="guardarEdicao()">Guardar</button>
      </div>
    </div>
  </div>
</div>
