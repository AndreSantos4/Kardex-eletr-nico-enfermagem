<div class="pop-up-editar fixed inset-0 z-10 flex items-center justify-center min-h-screen w-full h-full bg-black/55" style="display: none">
  <div class="pop-up bg-[#1a5f7a] rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.45)] w-[540px] max-w-[95vw] overflow-hidden">
    <div class="pop-up-header bg-[#154e66] flex items-center justify-between px-[18px] py-[14px] border-b border-white/10">
      <div class="title"><h3 class="text-text text-[1.05rem] font-semibold m-0">Editar Utilizador</h3></div>
      <div class="icon">
        <a href="" class="cross flex items-center justify-center bg-white rounded-full w-7 h-7 hover:bg-[#bababa]" onclick="fecharPopUp(); return false;">
          <svg xmlns="http://www.w3.org/2000/svg" height="13" width="13" viewBox="0 0 384 512">
            <path fill="rgb(220, 49, 26)" d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
          </svg>
        </a>
      </div>
    </div>
    <div class="pop-up-main px-[18px] py-[14px] flex flex-col gap-2 [&_label]:block [&_label]:text-[#e0f0f8] [&_label]:text-[0.68rem] [&_label]:font-bold [&_label]:tracking-[0.8px] [&_label]:uppercase [&_label]:mb-1 [&_input]:w-full [&_input]:bg-white [&_input]:border-[1.5px] [&_input]:border-white/35 [&_input]:rounded-md [&_input]:px-[10px] [&_input]:py-2 [&_input]:text-[0.87rem] [&_input]:text-[#1a3a4a] [&_input]:outline-none [&_input]:mb-[6px] [&_select]:w-full [&_select]:bg-white [&_select]:border-[1.5px] [&_select]:border-white/35 [&_select]:rounded-md [&_select]:px-[10px] [&_select]:py-2 [&_select]:text-[0.87rem] [&_select]:text-[#1a3a4a] [&_select]:outline-none [&_select]:mb-[6px]">
      <form method="post" data-user-id="">
        <label for="edit-name">NOME COMPLETO *</label>
        <input type="text" name="name" id="edit-name" placeholder="Nome Completo" required />

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label for="edit-data-nascimento">DATA DE NASCIMENTO *</label>
            <input type="date" name="data-nascimento" id="edit-data-nascimento" required />
          </div>
          <div class="form-group flex-1">
            <label for="edit-sexo">Sexo *</label>
            <select name="sexo" id="edit-sexo">
              <option value="MASCULINO">Masculino</option>
              <option value="FEMININO">Feminino</option>
            </select>
          </div>
        </div>

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label for="edit-n-identificacao">Nº IDENTIFICAÇÃO *</label>
            <input type="text" name="n-identificacao" id="edit-n-identificacao" placeholder="123456789AB1" maxlength="12" pattern="\d{9}[A-Z]{2}\d" title="9 dígitos, 2 letras maiúsculas e 1 dígito" required />
          </div>
          <div class="form-group flex-1">
            <label for="edit-n-sns">Nº SNS *</label>
            <input type="text" name="n-sns" id="edit-n-sns" pattern="\d{9}" placeholder="Número SNS" required />
          </div>
        </div>

        <label for="edit-email">EMAIL *</label>
        <input type="email" name="email" id="edit-email" placeholder="Email" required />

        <div class="form-row flex gap-3">
          <div class="form-group flex-1">
            <label for="edit-contacto">CONTACTO *</label>
            <input type="tel" name="contacto" id="edit-contacto" placeholder="Contacto" pattern="[0-9]{9}" required />
          </div>
          <div class="form-group flex-1">
            <label for="edit-contacto-emg">CONTACTO EMERGÊNCIA *</label>
            <input type="tel" name="contacto-emg" id="edit-contacto-emg" placeholder="Contacto de Emergência" pattern="[0-9]{9}" required />
          </div>
        </div>

        <label for="edit-funcao">FUNÇÃO *</label>
        <select id="edit-funcao" name="funcao">
          <option value="ADMIN">Administrador</option>
          <option value="MEDICO">Médico</option>
          <option value="ENFERMEIRO_CHEFE">Enfermeiro-Chefe</option>
          <option value="ENFERMEIRO">Enfermeiro</option>
        </select>
      </form>
    </div>
    <div class="pop-up-footer bg-[#154e66] px-[18px] py-3 border-t border-white/10 flex flex-col gap-[10px]">
      <div class="warning-box bg-white/10 rounded-md px-3 py-[7px]">
        <label class="text-text">Alterações ficam registadas no log de autoria</label>
      </div>
      <div class="buttons flex py-[2%] gap-[10px]">
        <button class="btn-cancelar flex-1 p-[10px] bg-[#2a7fa0] text-white border-2 border-white/30 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-95 transition-all" onclick="fecharPopUp()">Cancelar</button>
        <button class="flex-1 p-[10px] bg-[#2a7fa0] text-white border-2 border-white/30 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-95 transition-all" onclick="guardarEdicao()">Guardar</button>
      </div>
    </div>
  </div>
</div>
