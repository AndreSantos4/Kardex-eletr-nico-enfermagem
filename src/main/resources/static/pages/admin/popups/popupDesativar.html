<div class="pop-up-desativar fixed inset-0 z-10 flex items-center justify-center min-h-screen w-full h-full bg-black/55" style="display: none">
  <div class="pop-up bg-[#1a5f7a] rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.45)] w-[540px] max-w-[95vw] overflow-hidden">
    <div class="pop-up-header bg-[#154e66] flex items-center justify-between px-[18px] py-[14px] border-b border-white/10">
      <div class="title"><h3 class="text-text text-[1.05rem] font-semibold m-0">Desativar Utilizador</h3></div>
      <div class="icon">
        <a href="" class="cross flex items-center justify-center bg-white rounded-full w-7 h-7 hover:bg-[#bababa]" onclick="fecharPopUp(); return false;">
          <svg xmlns="http://www.w3.org/2000/svg" height="13" width="13" viewBox="0 0 384 512">
            <path fill="rgb(220, 49, 26)" d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
          </svg>
        </a>
      </div>
    </div>
    <div class="pop-up-main px-[18px] py-[14px] flex flex-col gap-2">
      <div class="warning-box bg-white/10 rounded-md px-3 py-[7px]">
        <label class="block text-text text-[0.78rem]">O utilizador perderá imediatamente acesso ao sistema. Todas as sessões serão revogadas.</label>
      </div>
      <p id="desativar-info" class="text-text text-sm pb-[10px] m-0"></p>
      <form>
        <label for="motivo" class="block text-[#e0f0f8] text-[0.68rem] font-bold tracking-[0.8px] uppercase mb-1">Motivo *</label>
        <input type="text" id="motivo" placeholder="Motivo" class="w-full bg-white border-[1.5px] border-white/35 rounded-md px-[10px] py-5 text-[0.87rem] text-[#1a3a4a] outline-none mb-[6px]" />
      </form>
    </div>
    <div class="pop-up-footer bg-[#154e66] px-[18px] py-3 border-t border-white/10 flex flex-col gap-[10px]">
      <div class="buttons flex py-[2%] gap-[10px]">
        <input type="button" value="Cancelar" class="flex-1 p-[10px] bg-[#2a7fa0] text-white border-2 border-white/30 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-95 transition-all" onclick="fecharPopUp()" />
        <input type="button" value="Desativar" class="flex-1 p-[10px] bg-[#2a7fa0] text-white border-2 border-white/30 rounded-md text-[0.8rem] font-bold tracking-wider uppercase cursor-pointer hover:bg-[#236d8c] active:scale-95 transition-all" onclick="confirmarDesativar()" />
      </div>
    </div>
  </div>
</div>
