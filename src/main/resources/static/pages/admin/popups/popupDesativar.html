<div class="pop-up-desativar" style="display: none">
  <div class="pop-up">
    <div class="pop-up-header">
      <div class="title"><h3>Desativar Utilizador</h3></div>
      <div class="icon">
        <a
          href=""
          class="cross"
          onclick="
            fecharPopUp();
            return false;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="15"
            width="15"
            viewBox="0 0 384 512"
          >
            <path
              fill="rgb(220, 49, 26)"
              d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
            />
          </svg>
        </a>
      </div>
    </div>
    <div class="pop-up-main">
      <div class="warning-box">
        <label
          >O utilizador perderá imediatamente acesso ao sistema. Todas as
          sessões serão revogadas.</label
        >
      </div>
      <p id="desativar-info"></p>
      <form>
        <label for="motivo">Motivo *</label>
        <input type="text" id="motivo" placeholder="Motivo" />
      </form>
    </div>
    <div class="pop-up-footer">
      <div class="buttons">
        <input type="button" value="Cancelar" onclick="fecharPopUp()" />
        <input type="button" value="Desativar" onclick="confirmarDesativar()" />
      </div>
    </div>
  </div>
</div>
