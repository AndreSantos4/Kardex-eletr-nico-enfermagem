<div class="pop-up-criar" style="display: none">
  <div class="pop-up">
    <div class="pop-up-header">
      <div class="title"><h3>Criar Utilizador</h3></div>
      <div class="icon">
        <a
          href=""
          class="cross"
          onclick="
            fecharPopUp();
            return false;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="15"
            width="15"
            viewBox="0 0 384 512"
          >
            <path
              fill="rgb(220, 49, 26)"
              d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
            />
          </svg>
        </a>
      </div>
    </div>
    <div class="pop-up-main">
      <form onsubmit="createUser(event)" method="post">
        <label for="name">NOME COMPLETO *</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Nome Completo"
          required
        />

        <div class="form-row">
          <div class="form-group">
            <label for="data-nascimento">DATA DE NASCIMENTO *</label>
            <input
              type="date"
              name="data-nascimento"
              id="data-nascimento"
              required
            />
          </div>
          <div class="form-group">
            <label for="sexo">Sexo *</label>
            <select name="sexo" id="sexo">
              <option value="MASCULINO">Masculino</option>
              <option value="FEMININO">Feminino</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="n-identificacao">Nº IDENTIFICAÇÃO *</label>
            <input
              type="text"
              name="n-identificacao"
              id="n-identificacao"
              placeholder="123456789AB1"
              maxlength="12"
              pattern="\d{9}[A-Z]{2}\d"
              title="9 dígitos, 2 letras maiúsculas e 1 dígito"
              required
            />
          </div>
          <div class="form-group">
            <label for="n-sns">Nº SNS *</label>
            <input
              type="text"
              name="n-sns"
              id="n-sns"
              pattern="\d{9}"
              placeholder="Número SNS"
              required
            />
          </div>
        </div>

        <label for="email">EMAIL *</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Email"
          required
        />

        <div class="form-row">
          <div class="form-group">
            <label for="contacto">CONTACTO *</label>
            <input
              type="tel"
              name="contacto"
              id="contacto"
              placeholder="Contacto"
              pattern="[0-9]{9}"
              required
            />
          </div>
          <div class="form-group">
            <label for="contacto-emg">CONTACTO EMERGÊNCIA *</label>
            <input
              type="tel"
              name="contacto-emg"
              id="contacto-emg"
              placeholder="Contacto de Emergência"
              pattern="[0-9]{9}"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="funcao">FUNÇÃO *</label>
            <select id="funcao" name="funcao">
              <option value="ADMIN">Administrador</option>
              <option value="MEDICO">Médico</option>
              <option value="ENFERMEIRO_CHEFE">Enfermeiro-Chefe</option>
              <option value="ENFERMEIRO">Enfermeiro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="n-mecanografico">Nº Mecanográfico *</label>
            <input
              type="text"
              name="n-mecanografico"
              id="n-mecanografico"
              pattern="\d{9}"
              placeholder="Número Mecanográfico"
              required
            />
          </div>
        </div>

        <div class="warning-box" id="errorBox" style="display: none">
          <p id="errorMsg">Dados já se encontram no sistema!</p>
        </div>

        <div class="buttons">
          <input
            type="button"
            value="Cancelar"
            class="btn-cancelar"
            onclick="fecharPopUp()"
          />
          <input type="submit" value="Guardar" />
        </div>
      </form>
    </div>
  </div>
</div>
