<link rel="stylesheet" href="../../../styles/admin/popup/popupEditarMedicamento.css" />

<div class="pop-up-editar-medicamento" style="display:none">
  <div class="pop-up">
    <div class="pop-up-header">
      <div class="title"><h3>Editar Medicamento</h3></div>
      <div class="icon">
        <a
          href=""
          class="cross"
          onclick="
            fecharPopUp('.pop-up-editar-medicamento');
            return false;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="15"
            width="15"
            viewBox="0 0 384 512"
          >
            <path
              fill="#ffffff"
              d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
            />
          </svg>
        </a>
      </div>
    </div>

    <div class="pop-up-main">
      <form
        method="post"
        id="form-editar-medicamento"
        onsubmit="editarMedicamento(event)"
        data-medicamento-id=""
      >
        <div class="form-row">
          <div class="form-group">
            <label for="edit-med-nome">NOME COMERCIAL *</label>
            <input
              type="text"
              name="nome"
              id="edit-med-nome"
              placeholder="Nome Comercial"
              required
            />
          </div>
          <div class="form-group">
            <label for="edit-med-principio">PRINCÍPIO ATIVO *</label>
            <input
              type="text"
              name="principio-ativo"
              id="edit-med-principio"
              placeholder="Principio Ativo"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-med-classe">CLASSE FARMACOLÓGICA *</label>
            <select name="classe-farmacologica" id="edit-med-classe" required>
              <option value="ANTIBIOTICO">Antibiótico</option>
              <option value="SISTEMA_NERVOSO_CENTRAL">
                Sistema Nervoso Central
              </option>
              <option value="APARELHO_CARDIOVASCULAR">
                Aparelho Cardiovascular
              </option>
              <option value="SISTEMA_RESPIRATORIO">Sistema Respiratório</option>
              <option value="SISTEMA_ENDOCRINO">Sistema Endócrino</option>
              <option value="ANALGESICO">Analgésico</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-med-dosagens">DOSAGENS DISPONÍVEIS *</label>
            <input
              type="text"
              name="dosagens"
              id="edit-med-dosagens"
              placeholder="1mg, 2mg, 4mg, 6mg"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-med-via">VIA *</label>
            <select name="via" id="edit-med-via" required>
              <option value="ORAL">Oral</option>
              <option value="NASAL">Nasal</option>
              <option value="OCULAR">Ocular</option>
              <option value="AURICULAR">Auricular</option>
              <option value="RETAL">Retal</option>
              <option value="SUBLINGUAL">Sublingual</option>
              <option value="CUTANEA">Cutânea</option>
              <option value="SUBCUTANEA">Subcutânea</option>
              <option value="INTRAVENOSA">Intravenosa</option>
              <option value="INTRAMUSCULAR">Intramuscular</option>
              <option value="INTRADERMICA">Intradérmica</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-med-dose-max">DOSAGEN MÁX. DIÁRIA *</label>
            <input
              type="text"
              name="dose-maxima"
              id="edit-med-dose-max"
              placeholder="16mg/dia"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group-full">
            <label for="edit-med-forma">FORMA*</label>
            <select name="forma" id="edit-med-forma" required>
              <option value="SOLIDA">Comprimido</option>
              <option value="SEMI_SOLIDA">Semi-sólida</option>
              <option value="LIQUIDA">Líquida</option>
              <option value="GASOSA">Gasosa</option>
            </select>
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" name="alto-risco" id="edit-med-alto-risco" />
          <span>Alto risco - requer dupla confirmação</span>
        </label>

        <div class="info-box">
          <span class="info-icon">i</span>
          <p>
            Alterações aplicam-se a novas prescrições. Prescrições ativas não
            são afetadas.
          </p>
        </div>

        <div class="buttons">
          <input
            type="button"
            value="Cancelar"
            class="btn-cancelar"
            onclick="fecharPopUp('.pop-up-editar-medicamento')"
          />
          <input type="submit" value="Editar" />
        </div>
      </form>
    </div>
  </div>
</div>
