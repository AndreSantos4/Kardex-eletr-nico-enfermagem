<!doctype html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Admin Logs Auditoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: "#2a6f97", secondary: "#a8d4e6", "bg-dark": "#1a3f5e", text: "#e8f4f8", "input-bg": "#1e4d6b", ok: "#2e9e6e", alertas: "hsl(0, 98%, 36%)" },
                fontFamily: { sans: ['"Inter"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"] },
            }},
        };
    </script>
</head>

<body class="font-sans flex flex-row h-screen w-full m-0 p-0 bg-white overflow-hidden box-border">
    <nav class="w-[210px] shrink-0 bg-primary h-screen flex flex-col py-3 [&_a]:no-underline [&_.sidebar-item]:flex [&_.sidebar-item]:items-center [&_.sidebar-item]:gap-2.5 [&_.sidebar-item]:px-[18px] [&_.sidebar-item]:py-2 [&_.sidebar-item]:text-[13.5px] [&_.sidebar-item]:text-secondary [&_.sidebar-item]:cursor-pointer [&_.sidebar-item:hover]:bg-white [&_.sidebar-item:hover]:text-primary [&_.sidebar-item.active]:bg-white [&_.sidebar-item.active]:text-primary [&_.sidebar-item_svg]:w-[18px] [&_.sidebar-item_svg]:h-[18px] [&_.sidebar-item_svg]:shrink-0 [&_.sidebar-item_svg]:fill-current">
        <div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-1.5 pb-1.5 uppercase">Principal</div>
        <a href="adminDashboard"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1z" /></svg>Home</div></a>
        <a href="adminGestaoUtilizadores"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32z" /></svg>Utilizadores</div></a>
        <a href="adminMedicamentos"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M64 112c0-26.5 21.5-48 48-48s48 21.5 48 48l0 112-96 0 0-112zM176 368c0-48.7 18.1-93.2 48-127l0-129C224 50.1 173.9 0 112 0S0 50.1 0 112L0 400c0 61.9 50.1 112 112 112 37.3 0 70.3-18.2 90.7-46.3z" /></svg>Medicamentos</div></a>
        <div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-3.5 pb-1.5 uppercase">Auditoria</div>
        <a href="adminConsultarLogsAuditoria"><div class="sidebar-item active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M0 64C0 28.7 28.7 0 64 0L213.5 0c17 0 33.3 6.7 45.3 18.7L365.3 125.3c12 12 18.7 28.3 18.7 45.3L384 448c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zm208-5.5l0 93.5c0 13.3 10.7 24 24 24L325.5 176 208 58.5z" /></svg>Logs Auditoria</div></a>
        <div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-3.5 pb-1.5 uppercase">Controlo</div>
        <a href="adminSessoesAtivas"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M200 48l112 0c4.4 0 8 3.6 8 8l0 40-128 0 0-40c0-4.4 3.6-8 8-8zm-56 8l0 40-80 0C28.7 96 0 124.7 0 160l0 96 512 0 0-96c0-35.3-28.7-64-64-64l-80 0 0-40c0-30.9-25.1-56-56-56L200 0c-30.9 0-56 25.1-56 56z" /></svg>Sessões Ativas</div></a>
        <div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M224 0l0 64c0 8.8 7.2 16 16 16l32 0c8.8 0 16-7.2 16-16l0-64 32 0c35.3 0 64 28.7 64 64l0 128c0 5.5-.7 10.9-2 16l-252 0c-1.3-5.1-2-10.5-2-16l0-128c0-35.3 28.7-64 64-64l32 0z" /></svg>Hist. Stock</div>
        <div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M384 512L96 512c-53 0-96-43-96-96L0 96C0 43 43 0 96 0L400 0c26.5 0 48 21.5 48 48l0 288c0 20.9-13.4 38.7-32 45.3l0 66.7c17.7 0 32 14.3 32 32s-14.3 32-32 32l-32 0z" /></svg>Relatórios</div>
    </nav>

    <div class="flex flex-col flex-1 h-screen overflow-y-auto bg-white">
        <div class="bg-primary px-6 h-[52px] flex items-center justify-between border-b border-white/10">
            <span class="text-[13px] text-secondary tracking-wider"></span>
            <div class="flex items-center gap-4">
                <span class="bg-[#6b3838] text-white text-[11px] font-bold px-2 py-0.5 rounded-sm tracking-wider">Administrador</span>
                <button class="bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-widest px-[18px] py-[5px] cursor-pointer rounded-md hover:bg-white hover:text-primary transition-colors" onclick="logout()">SAIR</button>
            </div>
        </div>

        <div class="flex flex-col flex-1 gap-4 px-5 py-4 bg-white [&_.row-datetime]:text-[13px] [&_.row-datetime]:font-bold [&_.row-user-name]:font-bold [&_.badge-acesso]:bg-transparent [&_.badge-acesso]:text-white [&_.badge-acesso]:p-0 [&_.badge-acesso]:font-bold [&_.badge-acesso]:text-[13px] [&_.badge-login]:bg-transparent [&_.badge-login]:text-white [&_.badge-login]:p-0 [&_.badge-login]:font-bold [&_.badge-login]:text-[13px] [&_.badge-medicamento]:bg-transparent [&_.badge-medicamento]:text-white [&_.badge-medicamento]:p-0 [&_.badge-medicamento]:font-bold [&_.badge-medicamento]:text-[13px] [&_.badge-incidente]:bg-transparent [&_.badge-incidente]:text-white [&_.badge-incidente]:p-0 [&_.badge-incidente]:font-bold [&_.badge-incidente]:text-[13px] [&_.row-desc]:whitespace-normal [&_.row-desc]:max-w-[500px] [&_.row-desc]:break-words [&_.row-desc]:font-semibold [&_.row-desc]:text-[13px] [&_.row-ip]:font-bold [&_.row-ip]:text-right [&_.btn-pagina]:min-w-[32px] [&_.btn-pagina]:h-8 [&_.btn-pagina]:px-2.5 [&_.btn-pagina]:bg-transparent [&_.btn-pagina]:border-2 [&_.btn-pagina]:border-[#1e6b93] [&_.btn-pagina]:rounded-md [&_.btn-pagina]:text-[#1e6b93] [&_.btn-pagina]:text-xs [&_.btn-pagina]:font-bold [&_.btn-pagina]:cursor-pointer [&_.btn-pagina]:transition-colors [&_.btn-pagina:hover]:bg-[#1e6b93]/5 [&_.btn-pagina.ativo]:bg-[#1e6b93] [&_.btn-pagina.ativo]:border-[#1e6b93] [&_.btn-pagina.ativo]:!text-white [&_.paginacao-tamanho_select]:bg-white [&_.paginacao-tamanho_select]:border-2 [&_.paginacao-tamanho_select]:border-[#1e6b93] [&_.paginacao-tamanho_select]:text-[#1e6b93] [&_.paginacao-tamanho_select]:text-xs [&_.paginacao-tamanho_select]:font-bold [&_.paginacao-tamanho_select]:px-2 [&_.paginacao-tamanho_select]:py-1 [&_.paginacao-tamanho_select]:rounded-md [&_.paginacao-tamanho_select]:cursor-pointer [&_.paginacao-tamanho_select]:outline-none">
            <div class="bg-primary rounded px-5 py-[14px] flex items-center justify-between gap-4 shrink-0">
                <div>
                    <h1 class="text-white text-[15px] font-bold tracking-wider m-0">Logs de Auditoria</h1>
                    <p id="log-count" class="block text-secondary text-xs mt-0.5 font-mono">0 registos</p>
                </div>
                <div class="flex items-center gap-2.5">
                    <select id="filter-tipo" class="bg-white border border-white/10 rounded text-primary text-xs font-semibold px-2.5 py-1.5 cursor-pointer outline-none">
                        <option value="">Todos</option>
                        <option value="AUTH">Autenticação</option>
                        <option value="PATIENT_ACCEPTANCE">Utente admitido</option>
                        <option value="PATIENT_DISCHARGE">Utente liberado</option>
                        <option value="USER_CREATION">Criação de utilizador</option>
                        <option value="PASSWORD_RESET_REQUEST">Pedido alt. password</option>
                    </select>
                    <input type="date" id="filter-data" class="bg-white border border-white/10 rounded text-primary text-xs font-semibold px-2.5 py-[5px] cursor-pointer outline-none" />
                    <div class="flex items-center bg-white border border-white/10 rounded px-2.5 py-[5px] gap-1.5">
                        <input type="text" placeholder="Utilizador, IP" id="search-input" class="bg-transparent border-0 outline-none text-primary text-[13px] w-[180px] placeholder:text-secondary" />
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-3.5 h-3.5 fill-secondary shrink-0"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" /></svg>
                    </div>
                    <button class="bg-transparent border-2 border-white rounded-md text-white text-[13px] font-bold px-[18px] py-[5px] cursor-pointer outline-none hover:bg-white hover:text-primary transition-colors" onclick="window.location.href = 'adminDashboard'">Home</button>
                </div>
            </div>

            <div class="bg-[#1e6b93] rounded-lg border-2 border-[#1e6b93] overflow-hidden shadow-sm">
                <table class="logs-table w-full border-collapse text-[13.5px] bg-[#1e6b93]">
                    <thead>
                        <tr class="border-b-2 border-white/20 bg-[#1e6b93]">
                            <th class="text-left px-[18px] py-[14px] text-[12.5px] font-bold tracking-wider text-white whitespace-nowrap w-40">Data/Hora</th>
                            <th class="text-left px-[18px] py-[14px] text-[12.5px] font-bold tracking-wider text-white whitespace-nowrap w-[120px]">Utilizador</th>
                            <th class="text-left px-[18px] py-[14px] text-[12.5px] font-bold tracking-wider text-white whitespace-nowrap w-[90px]">Tipo</th>
                            <th class="text-left px-[18px] py-[14px] text-[12.5px] font-bold tracking-wider text-white whitespace-nowrap">Descrição</th>
                            <th class="text-right px-[18px] py-[14px] text-[12.5px] font-bold tracking-wider text-white whitespace-nowrap w-[120px]">IP</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body" class="[&>tr]:border-b-[1.5px] [&>tr]:border-white/20 [&>tr]:bg-[#1e6b93]/80 [&>tr:last-child]:border-0 [&>tr:hover]:bg-[#1e6b93] [&>tr>td]:px-[18px] [&>tr>td]:py-[14px] [&>tr>td]:text-white [&>tr>td]:whitespace-nowrap [&>tr>td]:font-semibold [&>tr>td]:align-middle"></tbody>
                </table>
            </div>

            <div class="flex items-center justify-between gap-2 pt-3 px-1 shrink-0" id="pagination"></div>
        </div>
    </div>

    <script src="../../scripts/logout.js"></script>
    <script src="../../scripts/admin/adminConsultarLogsAuditoria.js"></script>
    <div id="notificacoes-container"></div>
    <script src="../../scripts/notificacao.js"></script>
</body>

</html>
