<!doctype html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <title>Admin Gestão de Utilizadores</title>
  <link rel="stylesheet" href="../../styles/popups/notificacao.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: "#2a6f97", secondary: "#a8d4e6", "bg-dark": "#1a3f5e", text: "#e8f4f8", "input-bg": "#1e4d6b", ok: "#2e9e6e", alertas: "hsl(0, 98%, 36%)" },
        fontFamily: { sans: ['"Inter"', "sans-serif"], mono: ['"IBM Plex Mono"', "monospace"] },
      }},
    };
  </script>
  <style>
    /* badges e botões gerados pelo JS na tabela */
    .badge-ativo { background:#2e9e6e; color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:2px; letter-spacing:0.06em; }
    .badge-inativo { background:#e07070; color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:2px; letter-spacing:0.06em; }
    .btn-table { background:transparent; border:1.5px solid #2a6f97; color:#2a6f97; font-size:11px; font-weight:700; letter-spacing:0.08em; padding:4px 10px; cursor:pointer; border-radius:4px; white-space:nowrap; transition:background .15s,color .15s; }
    .btn-table:hover { background:#2a6f97; color:#fff; }
    .btn-desativar { border-color:#e07070; color:#e07070; }
    .btn-desativar:hover { background:#d95b5b; color:#fff; border-color:#d95b5b; }
  </style>
</head>

<body class="font-sans flex flex-col h-screen w-full m-0 p-0 bg-white text-text relative box-border">
  <div class="container flex flex-col h-screen relative">
    <div class="content-container w-full h-full absolute top-0 left-0 flex flex-col">
      <div class="bg-primary px-6 h-[52px] flex items-center justify-between border-b border-white/10">
        <span class="text-[13px] text-secondary tracking-wider">Gestão de Utilizadores</span>
        <div class="flex items-center gap-4">
          <span class="bg-[#6b3838] text-white text-[11px] font-bold px-2 py-0.5 rounded-sm tracking-wider">Administrador</span>
          <button class="bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-widest px-[18px] py-[5px] cursor-pointer rounded-[10px] hover:bg-white hover:text-primary transition-colors" onclick="logout()">SAIR</button>
        </div>
      </div>

      <div class="flex flex-1 gap-4 pr-[14px]">
        <nav class="w-[210px] shrink-0 bg-primary self-stretch py-3 [&_a]:no-underline [&_.sidebar-item]:flex [&_.sidebar-item]:items-center [&_.sidebar-item]:gap-2.5 [&_.sidebar-item]:px-[18px] [&_.sidebar-item]:py-2 [&_.sidebar-item]:text-[13.5px] [&_.sidebar-item]:text-secondary [&_.sidebar-item]:cursor-pointer [&_.sidebar-item:hover]:bg-white [&_.sidebar-item:hover]:text-primary [&_.sidebar-item.active]:bg-white [&_.sidebar-item.active]:text-primary [&_.sidebar-item_svg]:w-[18px] [&_.sidebar-item_svg]:h-[18px] [&_.sidebar-item_svg]:shrink-0 [&_.sidebar-item_svg]:fill-current">
          <div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-1.5 pb-1.5 uppercase">Principal</div>
          <a href="adminDashboard"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M240 6.1c9.1-8.2 22.9-8.2 32 0l232 208c9.9 8.8 10.7 24 1.8 33.9s-24 10.7-33.9 1.8l-8-7.2 0 205.3c0 35.3-28.7 64-64 64l-288 0c-35.3 0-64-28.7-64-64l0-205.3-8 7.2c-9.9 8.8-25 8-33.9-1.8s-8-25 1.8-33.9L240 6.1z"/></svg>Home</div></a>
          <a href="adminGestaoUtilizadores"><div class="sidebar-item active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M320 16a104 104 0 1 1 0 208 104 104 0 1 1 0-208zM96 88a72 72 0 1 1 0 144 72 72 0 1 1 0-144zM0 416c0-70.7 57.3-128 128-128 12.8 0 25.2 1.9 36.9 5.4-32.9 36.8-52.9 85.4-52.9 138.6l0 16c0 11.4 2.4 22.2 6.7 32L32 480c-17.7 0-32-14.3-32-32l0-32z"/></svg>Utilizadores</div></a>
          <a href="adminMedicamentos"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M64 112c0-26.5 21.5-48 48-48s48 21.5 48 48l0 112-96 0 0-112zM176 368c0-48.7 18.1-93.2 48-127l0-129C224 50.1 173.9 0 112 0S0 50.1 0 112L0 400c0 61.9 50.1 112 112 112 37.3 0 70.3-18.2 90.7-46.3z"/></svg>Medicamentos</div></a>
          <div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-3.5 pb-1.5 uppercase">Auditoria</div>
          <a href="adminConsultarLogsAuditoria"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M0 64C0 28.7 28.7 0 64 0L213.5 0c17 0 33.3 6.7 45.3 18.7L365.3 125.3c12 12 18.7 28.3 18.7 45.3L384 448c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64z"/></svg>Logs Auditoria</div></a>
          <div class="text-[11px] font-bold tracking-[0.12em] text-white px-[18px] pt-3.5 pb-1.5 uppercase">Controlo</div>
          <a href="adminSessoesAtivas"><div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M200 48l112 0c4.4 0 8 3.6 8 8l0 40-128 0 0-40c0-4.4 3.6-8 8-8zm-56 8l0 40-80 0C28.7 96 0 124.7 0 160l0 96 512 0 0-96c0-35.3-28.7-64-64-64l-80 0 0-40c0-30.9-25.1-56-56-56L200 0c-30.9 0-56 25.1-56 56z"/></svg>Sessões Ativas</div></a>
          <div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M224 0l0 64c0 8.8 7.2 16 16 16l32 0c8.8 0 16-7.2 16-16l0-64 32 0c35.3 0 64 28.7 64 64l0 128c0 5.5-.7 10.9-2 16l-252 0c-1.3-5.1-2-10.5-2-16l0-128c0-35.3 28.7-64 64-64l32 0z"/></svg>Hist. Stock</div>
          <div class="sidebar-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M384 512L96 512c-53 0-96-43-96-96L0 96C0 43 43 0 96 0L400 0c26.5 0 48 21.5 48 48l0 288c0 20.9-13.4 38.7-32 45.3l0 66.7c17.7 0 32 14.3 32 32s-14.3 32-32 32l-32 0z"/></svg>Relatórios</div>
        </nav>

        <div class="flex-1 flex flex-col gap-[14px] py-[14px] pr-[14px] pl-4">
          <div class="bg-primary rounded px-5 py-[14px] flex items-center justify-between">
            <div>
              <h1 class="text-[15px] font-bold tracking-wider m-0">Administração do Sistema</h1>
              <p class="text-xs text-secondary mt-0.5 font-mono m-0">0 utilizadores</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="flex items-center bg-white border border-white/10 rounded px-2.5 py-[5px] gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-3.5 h-3.5 fill-secondary shrink-0"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>
                <input type="text" placeholder="Utilizador, Nº Mecan." class="bg-transparent border-0 outline-none text-primary text-[13px] w-[180px] placeholder:text-secondary" />
              </div>
              <button class="btn-criar bg-transparent border-2 border-white text-white text-[13px] font-bold tracking-widest px-[18px] py-[5px] cursor-pointer rounded-md hover:bg-white hover:text-primary transition-colors" onclick="abrirCriar()">CRIAR</button>
            </div>
          </div>

          <div class="bg-primary rounded border border-white/10 overflow-x-auto">
            <table class="users-table w-full border-collapse text-[13px]">
              <thead>
                <tr class="border-b-2 border-white/10">
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap">Nº Mecanográfico</th>
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap">Nome</th>
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap">Role</th>
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap">Email</th>
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap">Último Acesso</th>
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap">Estado</th>
                  <th class="text-left px-4 py-3 text-xs font-bold tracking-wider text-white whitespace-nowrap"></th>
                </tr>
              </thead>
              <tbody class="[&>tr]:border-b-2 [&>tr]:border-primary [&>tr]:bg-white [&>tr>td]:px-4 [&>tr>td]:py-3 [&>tr>td]:text-black [&>tr>td]:whitespace-nowrap [&_a]:text-black [&_a]:no-underline [&_a]:text-xs [&_.actions]:flex [&_.actions]:gap-1.5 [&_.actions]:justify-end"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="pop-up-container" style="display: none" id="popUpContainer"></div>
    </div>
  </div>
  <script src="../../scripts/logout.js"></script>
  <script src="../../scripts/popups/popupCriar.js"></script>
  <script src="../../scripts/popups/popupEditar.js"></script>
  <script src="../../scripts/popups/popupDesativar.js"></script>
  <script src="../../scripts/adminGestaoUtilizadores.js"></script>
  <div id="notificacoes-container"></div>
  <script src="../../scripts/notificacao.js"></script>
</body>

</html>
